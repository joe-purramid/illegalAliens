<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGAL ALIENS</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --bg2: #111122;
  --bg3: #1a1a2e;
  --green: #39ff14;
  --pink: #ff2a6d;
  --purple: #b026ff;
  --yellow: #ffe600;
  --cyan: #00fff7;
  --text: #d0d0e0;
  --dim: #6a6a8a;
  --border: #2a2a4a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);pointer-events:none;z-index:9999}

/* SCREENS */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.screen.active{display:flex}
.game-screen.active{display:flex;flex-direction:row;justify-content:center;align-items:flex-start;flex-wrap:wrap;min-height:100vh;padding:10px;gap:12px}

/* COMMON */
h1.logo{font-family:'Creepster',cursive;font-size:52px;color:var(--green);text-shadow:3px 3px 0 var(--purple),-1px -1px 0 var(--pink),0 0 30px rgba(57,255,20,0.3);letter-spacing:4px;transform:skewY(-1.5deg);margin-bottom:6px;text-align:center}
.sub{font-family:'Russo One',sans-serif;font-size:11px;color:var(--purple);letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:30px}
.btn{font-family:'Russo One',sans-serif;font-size:13px;padding:10px 24px;border:2px solid var(--green);background:transparent;color:var(--green);cursor:pointer;letter-spacing:2px;transition:all .2s;border-radius:3px;text-transform:uppercase}
.btn:hover{background:var(--green);color:var(--bg);box-shadow:0 0 20px rgba(57,255,20,0.3)}
.btn:disabled{opacity:0.3;cursor:default;background:transparent;color:var(--green);box-shadow:none}
.btn.pink{border-color:var(--pink);color:var(--pink)}
.btn.pink:hover{background:var(--pink);color:#fff}
.btn.yellow{border-color:var(--yellow);color:var(--yellow)}
.btn.yellow:hover{background:var(--yellow);color:var(--bg)}
.btn.small{font-size:11px;padding:6px 14px}
input[type=text],input[type=password]{font-family:'Share Tech Mono',monospace;font-size:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:3px;outline:none;width:260px;text-align:center}
input:focus{border-color:var(--purple);box-shadow:0 0 10px rgba(176,38,255,0.2)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:20px;max-width:400px;width:100%}
.error{color:var(--pink);font-size:12px;margin-top:8px;text-align:center}
.gap{height:12px}
.center{text-align:center}

/* LOBBY */
.room-list{max-height:240px;overflow-y:auto;margin:12px 0}
.room-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:3px;margin:6px 0;background:rgba(255,255,255,0.02)}
.room-item .rname{color:var(--cyan);font-weight:bold}
.room-item .rcount{color:var(--dim);font-size:12px}

/* ROOM */
.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.color-pick{width:60px;height:60px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:24px}
.color-pick:hover{transform:scale(1.1)}
.color-pick.selected{border-color:#fff;box-shadow:0 0 15px rgba(255,255,255,0.3)}
.color-pick.taken{opacity:0.2;cursor:default}
.player-list{margin:12px 0}
.player-entry{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}

/* BOARD */
.board-wrap{position:relative;width:820px;height:720px;flex-shrink:0}
.board-svg{position:absolute;top:0;left:0;width:100%;height:100%}
.board-container{position:absolute;top:0;left:0;width:100%;height:100%}
.node{position:absolute;border-radius:4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:2}
.node.step{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);margin-left:-14px;margin-top:-14px}
.node.step:hover{border-color:var(--purple);background:rgba(176,38,255,0.15)}
.node.step.valid{border-color:var(--green);background:rgba(57,255,20,0.12);box-shadow:0 0 8px rgba(57,255,20,0.3);animation:pulse 1s infinite}
.node.step.crash{border:1px dashed var(--yellow)}
.node.location{min-width:80px;height:36px;padding:0 10px;background:var(--bg2);border:2px solid var(--cyan);margin-left:-40px;margin-top:-18px;font-family:'Russo One',sans-serif;font-size:10px;color:var(--cyan);letter-spacing:1px;border-radius:6px;z-index:3}
.node.location:hover{border-color:var(--green);color:var(--green)}
.node.location.valid{border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(57,255,20,0.3);animation:pulse 1s infinite}
.node.hospital{width:90px;height:44px;background:var(--bg2);border:2px solid var(--pink);margin-left:-45px;margin-top:-22px;font-family:'Creepster',cursive;font-size:16px;color:var(--pink);border-radius:8px;z-index:3}
.node.hospital:hover{border-color:var(--green);color:var(--green)}
.node.hospital.valid{border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(57,255,20,0.3);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* MEEPLES */
.meeple{position:absolute;width:22px;height:30px;z-index:10;pointer-events:none;transition:left .4s ease,top .4s ease;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5))}

/* SIDEBAR */
.sidebar{width:280px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.side-panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:14px}
.side-panel h3{font-family:'Creepster',cursive;font-size:20px;color:var(--pink);margin-bottom:8px}
.side-panel h4{font-family:'Russo One',sans-serif;font-size:12px;color:var(--yellow);margin:8px 0 4px;letter-spacing:1px}
.phase-indicator{font-family:'Creepster',cursive;font-size:24px;color:var(--green);text-align:center;margin:4px 0}
.turn-info{text-align:center;font-size:12px;color:var(--dim);margin-bottom:4px}
.dice-display{font-size:48px;text-align:center;margin:8px 0;cursor:pointer;user-select:none;transition:transform .1s}
.dice-display:hover{transform:scale(1.1)}
.dice-display.rolling{animation:diceRoll .1s infinite}
@keyframes diceRoll{0%{transform:rotate(0deg)}25%{transform:rotate(10deg)}50%{transform:rotate(-10deg)}75%{transform:rotate(5deg)}100%{transform:rotate(0deg)}}
.mv-display{text-align:center;font-family:'Russo One',sans-serif;font-size:16px;color:var(--green);margin:4px 0}
.steps-left{text-align:center;font-size:12px;color:var(--dim)}
.organ-table{width:100%;border-collapse:collapse;margin:6px 0}
.organ-table td{padding:3px 6px;font-size:12px;border-bottom:1px solid var(--border)}
.organ-table td:first-child{color:var(--cyan)}
.organ-table td:last-child{text-align:right;color:var(--green)}
.log{max-height:150px;overflow-y:auto;font-size:11px;color:var(--dim);line-height:1.6}
.log .entry{padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.log .entry span{color:var(--yellow)}

/* GROUND ORGANS */
.ground-badge{position:absolute;bottom:-8px;right:-8px;min-width:16px;height:16px;background:var(--purple);border-radius:8px;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;z-index:4;pointer-events:none}

/* RULES LINK */
.rules-link{position:fixed;top:10px;right:10px;z-index:100}
.rules-link a{color:var(--dim);font-size:11px;text-decoration:none;border:1px solid var(--border);padding:4px 10px;border-radius:3px;transition:all .2s}
.rules-link a:hover{color:var(--green);border-color:var(--green)}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--purple);color:#fff;font-family:'Russo One',sans-serif;font-size:13px;padding:10px 24px;border-radius:4px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

<div id="screen-game" class="screen game-screen">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBaVFJSGVpFMmMmiOcz3rsFgnGRbVfujCE",
  authDomain:"prismadice-7866d.firebaseapp.com",
  databaseURL:"https://prismadice-7866d-default-rtdb.firebaseio.com",
  projectId:"prismadice-7866d"
});
const db = firebase.database();

// ============ CONSTANTS ============
const COLORS = {
  red:    {hex:'#ff4444',bg:'#441111'},
  yellow: {hex:'#ffdd00',bg:'#443d00'},
  orange: {hex:'#ff8800',bg:'#442800'},
  green:  {hex:'#44ff44',bg:'#114411'},
  blue:   {hex:'#4488ff',bg:'#112244'},
  purple: {hex:'#cc66ff',bg:'#331144'}
};
const COLOR_ORDER = ['red','yellow','orange','green','blue','purple'];

const LOCATION_NAMES = ['OLD FOLKS','GREASY SPORK','SPORTS!','BOOZ','NO-TEL','SCHÜL'];
const ORGAN_TYPES = ['intestine','heart','liver','lung','kidney','stomach'];
const ORGAN_LABELS = {intestine:'🫘 Intestine',heart:'❤️ Heart',liver:'🟤 Liver',lung:'🫁 Lung',kidney:'🫘 Kidney',stomach:'🟡 Stomach'};

// ============ BOARD GEOMETRY ============
// Positions: 0-5 = locations, 6 = hospital, 7-30 = ring steps, 31-60 = spoke steps
const CX = 410, CY = 345, RX = 290, RY = 220;
const LOC_ANGLES = [120, 60, 0, -60, -120, 180]; // degrees, math convention

function deg2rad(d){ return d * Math.PI / 180; }
function ellipseXY(angle){ return [CX + RX*Math.cos(deg2rad(angle)), CY - RY*Math.sin(deg2rad(angle))]; }

function buildPositions(){
  const pos = [];
  // 0-5: locations
  for(let i=0;i<6;i++){
    const [x,y] = ellipseXY(LOC_ANGLES[i]);
    pos.push({id:i, type:'location', name:LOCATION_NAMES[i], x, y});
  }
  // 6: hospital
  pos.push({id:6, type:'hospital', name:'HOSPITAL', x:CX, y:CY});
  // 7-30: ring steps (4 between each adjacent pair)
  for(let seg=0;seg<6;seg++){
    const a1 = LOC_ANGLES[seg];
    const a2 = LOC_ANGLES[(seg+1)%6];
    let diff = a2 - a1;
    if(diff > 180) diff -= 360;
    if(diff < -180) diff += 360;
    for(let s=1;s<=4;s++){
      const angle = a1 + diff * s / 5;
      const [x,y] = ellipseXY(angle);
      pos.push({id:7+seg*4+(s-1), type:'step', x, y, segment:seg, segStep:s});
    }
  }
  // 31-60: spoke steps (5 per location)
  for(let loc=0;loc<6;loc++){
    const lx=pos[loc].x, ly=pos[loc].y;
    for(let s=1;s<=5;s++){
      const t = s/6;
      pos.push({id:31+loc*5+(s-1), type:'step', x:lx+(CX-lx)*t, y:ly+(CY-ly)*t, spoke:loc, spokeStep:s});
    }
  }
  return pos;
}

function buildAdjacency(positions){
  const adj = {};
  for(const p of positions) adj[p.id] = new Set();
  function link(a,b){ adj[a].add(b); adj[b].add(a); }
  // Ring: loc0 -> s7,s8,s9,s10 -> loc1 -> s11...
  for(let seg=0;seg<6;seg++){
    const locA = seg;
    const locB = (seg+1)%6;
    const firstStep = 7 + seg*4;
    link(locA, firstStep);
    for(let s=0;s<3;s++) link(firstStep+s, firstStep+s+1);
    link(firstStep+3, locB);
  }
  // Spokes: loc -> s31..s35 -> hospital
  for(let loc=0;loc<6;loc++){
    const firstStep = 31 + loc*5;
    link(loc, firstStep);
    for(let s=0;s<4;s++) link(firstStep+s, firstStep+s+1);
    link(firstStep+4, 6);
  }
  return adj;
}

// Crash landing positions: 2 steps counter-clockwise from location
// Counter-clockwise from locX is segment (locX-1+6)%6, step 3 (index 2) in that segment
// Segment seg goes from loc[seg] to loc[(seg+1)%6], steps: seg*4+7 to seg*4+10
// 2 steps left of loc L: segment ending at L is seg=(L-1+6)%6, step index 2 (3rd of 4) = 7+seg*4+2
const CRASH_POSITIONS = [
  7 + 5*4 + 2, // L1: 2 left of OLD FOLKS(0), segment 5 (SCHÜL->OLD FOLKS), step 3 = index 29
  7 + 2*4 + 2, // L2: 2 left of BOOZ(3), segment 2 (SPORTS!->BOOZ), step 3 = index 17
  7 + 1*4 + 2, // L3: 2 left of SPORTS!(2), segment 1 (GREASY SPORK->SPORTS!), step 3 = index 13
  7 + 4*4 + 2, // L4: 2 left of SCHÜL(5), segment 4 (NO-TEL->SCHÜL), step 3 = index 25
  7 + 0*4 + 2, // L5: 2 left of GREASY SPORK(1), segment 0 (OLD FOLKS->GREASY SPORK), step 3 = index 9
  7 + 3*4 + 2  // L6: 2 left of NO-TEL(4), segment 3 (BOOZ->NO-TEL), step 3 = index 21
];

const positions = buildPositions();
const adjacency = buildAdjacency(positions);

function isLocation(id){ return id >= 0 && id <= 5; }
function isHospital(id){ return id === 6; }
function isPlace(id){ return id <= 6; }

// ============ STATE ============
let myId = localStorage.getItem('ia_playerId') || generateId();
localStorage.setItem('ia_playerId', myId);
let myName = '';
let currentRoom = null;
let roomRef = null;
let roomData = null;
let gameListeners = [];

function generateId(){ return Math.random().toString(36).substr(2,9) + Date.now().toString(36); }

// ============ SCREENS ============
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

// ============ PASSWORD ============
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword()});
function checkPassword(){
  const pw=document.getElementById('pw-input').value.trim().toLowerCase();
  if(pw==='phatphlamingo'){showScreen('lobby');refreshRooms();}
  else{document.getElementById('pw-error').style.display='block';}
}

// ============ LOBBY ============
function refreshRooms(){
  db.ref('illegalAliens/rooms').once('value',snap=>{
    const list=document.getElementById('room-list');
    const rooms=snap.val();
    if(!rooms){list.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p>';return;}
    list.innerHTML='';
    Object.entries(rooms).forEach(([id,r])=>{
      if(r.status==='finished')return;
      const count=r.players?Object.keys(r.players).length:0;
      const div=document.createElement('div');
      div.className='room-item';
      div.innerHTML=`<div><span class="rname">${r.name||id}</span> <span class="rcount">${count}/6</span></div>
        <button class="btn small" onclick="joinRoom('${id}')" ${r.status!=='waiting'||count>=6?'disabled':''}>JOIN</button>`;
      list.appendChild(div);
    });
    if(!list.children.length) list.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p>';
  });
}

function createRoom(){
  myName=document.getElementById('player-name').value.trim();
  if(!myName){toast('Enter a name first!');return;}
  const roomId=generateId().substr(0,6).toUpperCase();
  const roomData={
    name:'Room '+roomId, host:myId, status:'waiting', created:Date.now(),
    players:{[myId]:{name:myName,color:null,ready:false}}
  };
  db.ref('illegalAliens/rooms/'+roomId).set(roomData).then(()=>enterRoom(roomId));
}

function joinRoom(roomId){
  myName=document.getElementById('player-name').value.trim();
  if(!myName){toast('Enter a name first!');return;}
  const pRef=db.ref(`illegalAliens/rooms/${roomId}/players/${myId}`);
  pRef.set({name:myName,color:null,ready:false}).then(()=>enterRoom(roomId));
}

function enterRoom(roomId){
  currentRoom=roomId;
  roomRef=db.ref('illegalAliens/rooms/'+roomId);
  document.getElementById('room-code-display').textContent='ROOM: '+roomId;
  showScreen('room');
  roomRef.on('value',snap=>{
    roomData=snap.val();
    if(!roomData){leaveRoom();return;}
    if(roomData.status==='playing') initGame();
    else renderRoom();
  });
  roomRef.child('players/'+myId).onDisconnect().remove();
}

function leaveRoom(){
  if(roomRef){
    roomRef.child('players/'+myId).remove();
    roomRef.off();
    // If host leaves and room is waiting, clean up
  }
  currentRoom=null;roomRef=null;roomData=null;
  showScreen('lobby');refreshRooms();
}

// ============ ROOM UI ============
function renderRoom(){
  if(!roomData||!roomData.players)return;
  const players=roomData.players;
  const me=players[myId];
  if(!me){showScreen('lobby');refreshRooms();return;}
  // Color grid
  const grid=document.getElementById('color-grid');
  grid.innerHTML='';
  const takenColors=new Set(Object.values(players).map(p=>p.color).filter(Boolean));
  COLOR_ORDER.forEach(c=>{
    const div=document.createElement('div');
    div.className='color-pick'+(me.color===c?' selected':'')+(takenColors.has(c)&&me.color!==c?' taken':'');
    div.style.background=COLORS[c].hex;
    div.textContent='👽';
    if(!takenColors.has(c)||me.color===c) div.onclick=()=>selectColor(c);
    grid.appendChild(div);
  });
  // Player list
  const plist=document.getElementById('player-list');
  plist.innerHTML='';
  Object.entries(players).forEach(([pid,p])=>{
    const div=document.createElement('div');
    div.className='player-entry';
    div.innerHTML=`<div class="player-dot" style="background:${p.color?COLORS[p.color].hex:'#333'}"></div>
      <span${pid===myId?' style="color:var(--green)"':''}>${p.name}${pid===roomData.host?' ⭐':''}</span>
      <span style="margin-left:auto;font-size:11px;color:${p.ready?'var(--green)':'var(--dim)'};">${p.ready?'READY':'...'}</span>`;
    plist.appendChild(div);
  });
  // Buttons
  document.getElementById('ready-btn').disabled=!me.color;
  document.getElementById('ready-btn').textContent=me.ready?'UNREADY':'READY';
  const isHost=roomData.host===myId;
  const allReady=Object.values(players).every(p=>p.ready&&p.color);
  const enough=Object.keys(players).length>=2;
  const startBtn=document.getElementById('start-btn');
  startBtn.style.display=isHost?'inline-block':'none';
  startBtn.disabled=!(allReady&&enough);
}

function selectColor(c){
  roomRef.child('players/'+myId+'/color').set(c);
}

function toggleReady(){
  const me=roomData.players[myId];
  roomRef.child('players/'+myId+'/ready').set(!me.ready);
}

// ============ START GAME ============
function startGame(){
  if(!roomData)return;
  const playerIds=Object.keys(roomData.players);
  // Shuffle for turn order
  const turnOrder=[...playerIds];
  for(let i=turnOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[turnOrder[i],turnOrder[j]]=[turnOrder[j],turnOrder[i]];}
  // Assign crash positions
  const playersUpdate={};
  turnOrder.forEach((pid,idx)=>{
    const crashPos = CRASH_POSITIONS[idx];
    playersUpdate[pid]={
      ...roomData.players[pid],
      position: crashPos,
      crashLanding: idx,
      organs:{intestine:0,heart:0,liver:0,lung:0,kidney:0,stomach:0},
      lastVisitedLocation: -1,
      wanted: false,
      eliminated: false
    };
  });
  const gameState={
    status:'playing',
    players:playersUpdate,
    turnOrder,
    currentTurn:0,
    phase:'ready',
    movementValue:0,
    stepsThisTurn:[],
    groundOrgans:{},
    agentPosition:6,
    germs:{},
    log:[{text:`Game started! ${roomData.players[turnOrder[0]].name} goes first.`,time:Date.now()}]
  };
  roomRef.update(gameState);
}

// ============ GAME ============
function initGame(){
  showScreen('game');
  renderBoard();
  // Listen for game state changes
  if(gameListeners.length===0){
    roomRef.on('value',snap=>{
      roomData=snap.val();
      if(roomData&&roomData.status==='playing') renderGameState();
    });
    gameListeners.push(true);
  }
}

// ============ BOARD RENDERING ============
function renderBoard(){
  const svg=document.getElementById('board-svg');
  const container=document.getElementById('board-container');
  svg.innerHTML='';
  container.innerHTML='';
  // Draw connections as SVG lines
  const ns='http://www.w3.org/2000/svg';
  Object.entries(adjacency).forEach(([id,neighbors])=>{
    neighbors.forEach(nid=>{
      if(parseInt(id)<nid){
        const p1=positions[parseInt(id)], p2=positions[nid];
        const line=document.createElementNS(ns,'line');
        line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);
        line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
        line.setAttribute('stroke','#1a1a3a');line.setAttribute('stroke-width','2');
        svg.appendChild(line);
      }
    });
  });
  // Draw nodes
  positions.forEach(p=>{
    const div=document.createElement('div');
    div.id='node-'+p.id;
    div.dataset.nodeId=p.id;
    if(p.type==='location'){
      div.className='node location';
      div.textContent=p.name;
      div.style.left=p.x+'px';div.style.top=p.y+'px';
    } else if(p.type==='hospital'){
      div.className='node hospital';
      div.textContent=p.name;
      div.style.left=p.x+'px';div.style.top=p.y+'px';
    } else {
      div.className='node step';
      const isCrash=CRASH_POSITIONS.includes(p.id);
      if(isCrash) div.classList.add('crash');
      div.style.left=p.x+'px';div.style.top=p.y+'px';
    }
    div.onclick=()=>onNodeClick(p.id);
    container.appendChild(div);
  });
}

function getMeepleHTML(color){
  const hex=COLORS[color].hex;
  return `<svg viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="12" cy="29" rx="7" ry="3" fill="rgba(0,0,0,0.3)"/>
    <path d="M12 2 C6 2 4 8 4 14 C4 18 6 22 8 25 L8 28 L16 28 L16 25 C18 22 20 18 20 14 C20 8 18 2 12 2Z" fill="${hex}" stroke="#000" stroke-width="0.5"/>
    <circle cx="9" cy="12" r="3" fill="#fff"/>
    <circle cx="15" cy="12" r="3" fill="#fff"/>
    <circle cx="9" cy="12" r="1.8" fill="#111"/>
    <circle cx="15" cy="12" r="1.8" fill="#111"/>
    <ellipse cx="12" cy="18" rx="2" ry="1" fill="#000" opacity="0.6"/>
  </svg>`;
}

function renderMeeples(){
  document.querySelectorAll('.meeple').forEach(m=>m.remove());
  if(!roomData||!roomData.players)return;
  const container=document.getElementById('board-container');
  // Count meeples per position for stacking
  const posCount={};
  Object.entries(roomData.players).forEach(([pid,p])=>{
    if(p.eliminated)return;
    if(!posCount[p.position])posCount[p.position]=[];
    posCount[p.position].push({pid,color:p.color});
  });
  Object.entries(posCount).forEach(([posId,meeples])=>{
    const node=positions[parseInt(posId)];
    meeples.forEach((m,idx)=>{
      const div=document.createElement('div');
      div.className='meeple';
      div.innerHTML=getMeepleHTML(m.color);
      const offsetX = meeples.length > 1 ? (idx - (meeples.length-1)/2) * 16 : 0;
      div.style.left=(node.x - 11 + offsetX)+'px';
      div.style.top=(node.y - 28)+'px';
      container.appendChild(div);
    });
  });
  // Agent meeple
  if(roomData.agentPosition!==undefined){
    const agentPos=positions[roomData.agentPosition];
    const div=document.createElement('div');
    div.className='meeple';
    div.innerHTML=`<svg viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="12" cy="29" rx="7" ry="3" fill="rgba(0,0,0,0.3)"/>
      <rect x="4" y="4" width="16" height="22" rx="3" fill="#222" stroke="#555" stroke-width="0.5"/>
      <rect x="6" y="8" width="5" height="3" rx="1" fill="#ff0000" opacity="0.8"/>
      <rect x="13" y="8" width="5" height="3" rx="1" fill="#ff0000" opacity="0.8"/>
      <rect x="8" y="16" width="8" height="2" rx="1" fill="#555"/>
      <rect x="5" y="2" width="14" height="5" rx="2" fill="#333" stroke="#555" stroke-width="0.5"/>
    </svg>`;
    div.style.left=(agentPos.x + 12)+'px';
    div.style.top=(agentPos.y - 28)+'px';
    div.style.opacity='0.9';
    container.appendChild(div);
  }
}

// ============ GAME STATE RENDERING ============
function renderGameState(){
  if(!roomData)return;
  renderMeeples();
  renderSidebar();
  renderValidMoves();
}

function isMyTurn(){
  if(!roomData||!roomData.turnOrder)return false;
  return roomData.turnOrder[roomData.currentTurn]===myId;
}

function currentPlayerId(){
  return roomData.turnOrder[roomData.currentTurn];
}

function currentPlayerData(){
  return roomData.players[currentPlayerId()];
}

function renderSidebar(){
  const cp=currentPlayerData();
  const cpName=cp.name;
  const cpColor=COLORS[cp.color].hex;
  const isMine=isMyTurn();
  // Turn info
  document.getElementById('turn-info').innerHTML=
    `<span style="color:${cpColor}">${cpName}</span>'s turn${isMine?' (YOU)':''}`;
  // Phase
  const phaseNames={ready:'READY!',set:'SET!',flee:'FLEE!',harvest:'HARVEST!',hide:'HIDE!'};
  document.getElementById('phase-indicator').textContent=phaseNames[roomData.phase]||'—';
  // Phase controls
  const ctrl=document.getElementById('phase-controls');
  ctrl.innerHTML='';
  if(isMine) renderPhaseControls(ctrl);
  // My organs
  const me=roomData.players[myId];
  const tbody=document.querySelector('#my-organs tbody');
  tbody.innerHTML='';
  if(me){
    const target = roomData.turnOrder.length;
    ORGAN_TYPES.forEach(o=>{
      const tr=document.createElement('tr');
      const count=me.organs?me.organs[o]||0:0;
      const boxes = Array.from({length:6},(_,i)=>
        `<span style="display:inline-block;width:14px;height:14px;border:1px solid ${i<count?'var(--green)':'var(--border)'};background:${i<count?'rgba(57,255,20,0.25)':'transparent'};border-radius:2px;margin:0 1px;${i<target?'':'opacity:0.3'}"></span>`
      ).join('');
      tr.innerHTML=`<td>${ORGAN_LABELS[o]}</td><td>${boxes}</td>`;
      tbody.appendChild(tr);
    });
  }
  // Log
  renderLog();
}

function renderLog(){
  const logDiv=document.getElementById('game-log');
  if(!roomData.log)return;
  const entries=Array.isArray(roomData.log)?roomData.log:Object.values(roomData.log);
  logDiv.innerHTML=entries.slice(-20).map(e=>
    `<div class="entry">${e.text}</div>`
  ).join('');
  logDiv.scrollTop=logDiv.scrollHeight;
}

function addLog(text){
  const log=roomData.log||[];
  const newLog=[...log,{text,time:Date.now()}].slice(-50);
  roomRef.child('log').set(newLog);
}

// ============ PHASE CONTROLS ============
function renderPhaseControls(ctrl){
  const phase=roomData.phase;
  if(phase==='ready') renderReadyPhase(ctrl);
  else if(phase==='set') renderSetPhase(ctrl);
  else if(phase==='flee') renderFleePhase(ctrl);
  else if(phase==='harvest') renderHarvestPhase(ctrl);
  else if(phase==='hide') renderHidePhase(ctrl);
}

function renderReadyPhase(ctrl){
  ctrl.innerHTML=`
    <p style="text-align:center;color:var(--dim);font-size:12px;margin:8px 0">Draw 2 cards (Phase 2 placeholder)</p>
    <div style="text-align:center">
      <button class="btn small" onclick="completeReady()">DRAW CARDS</button>
    </div>`;
}

function completeReady(){
  addLog(`<span>${currentPlayerData().name}</span> draws 2 cards.`);
  roomRef.update({phase:'set'});
}

function renderSetPhase(ctrl){
  const mv=roomData.movementValue;
  if(!mv){
    ctrl.innerHTML=`
      <div class="dice-display" id="dice-btn" onclick="rollDice()">🎲</div>
      <p style="text-align:center;color:var(--dim);font-size:12px">Click to roll</p>`;
  } else {
    ctrl.innerHTML=`
      <div class="mv-display">Movement: ${mv}</div>
      <div style="text-align:center;margin-top:8px">
        <button class="btn small" onclick="beginFlee()">BEGIN FLEE!</button>
      </div>`;
  }
}

function rollDice(){
  const btn=document.getElementById('dice-btn');
  if(!btn)return;
  btn.classList.add('rolling');
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  let count=0;
  const interval=setInterval(()=>{
    btn.textContent=faces[Math.floor(Math.random()*6)];
    count++;
    if(count>15){
      clearInterval(interval);
      const roll=Math.floor(Math.random()*6)+1;
      btn.textContent=faces[roll-1];
      btn.classList.remove('rolling');
      addLog(`<span>${currentPlayerData().name}</span> rolled a ${roll}.`);
      roomRef.update({movementValue:roll});
    }
  },80);
}

function beginFlee(){
  const cp=currentPlayerData();
  roomRef.update({
    phase:'flee',
    stepsThisTurn:[cp.position],
    stepsRemaining:roomData.movementValue
  });
}

function renderFleePhase(ctrl){
  const remaining=roomData.stepsRemaining||0;
  const moved=(roomData.stepsThisTurn||[]).length-1;
  ctrl.innerHTML=`
    <div class="mv-display">Steps left: ${remaining}</div>
    <p style="text-align:center;color:var(--dim);font-size:11px;margin:4px 0">Click a highlighted space to move</p>
    ${moved>=1?`<div style="text-align:center;margin-top:8px">
      <button class="btn small yellow" onclick="endFlee()">STOP MOVING</button>
    </div>`:''}`;
}

function renderHarvestPhase(ctrl){
  const cp=currentPlayerData();
  const pos=cp.position;
  ctrl.innerHTML=`
    <p style="text-align:center;color:var(--dim);font-size:12px;margin:8px 0">Harvest phase (Phase 2+)</p>
    <div style="text-align:center">
      <button class="btn small" onclick="completeHarvest()">SKIP HARVEST</button>
    </div>`;
}

function completeHarvest(){
  addLog(`<span>${currentPlayerData().name}</span> skips harvest.`);
  roomRef.update({phase:'hide'});
}

function renderHidePhase(ctrl){
  ctrl.innerHTML=`
    <p style="text-align:center;color:var(--dim);font-size:12px;margin:8px 0">Draw up to hand limit (Phase 2+)</p>
    <div style="text-align:center">
      <button class="btn small" onclick="endTurn()">END TURN</button>
    </div>`;
}

function endTurn(){
  addLog(`<span>${currentPlayerData().name}</span> ends their turn.`);
  const nextTurn=(roomData.currentTurn+1)%roomData.turnOrder.length;
  // Skip eliminated players
  let next=nextTurn;
  let safety=0;
  while(roomData.players[roomData.turnOrder[next]].eliminated && safety<10){
    next=(next+1)%roomData.turnOrder.length;
    safety++;
  }
  const nextPlayer=roomData.players[roomData.turnOrder[next]];
  addLog(`<span>${nextPlayer.name}</span>'s turn begins.`);
  roomRef.update({
    currentTurn:next,
    phase:'ready',
    movementValue:0,
    stepsThisTurn:[],
    stepsRemaining:0
  });
}

// ============ MOVEMENT ============
function getValidMoves(){
  if(!roomData||roomData.phase!=='flee'||!isMyTurn())return[];
  const remaining=roomData.stepsRemaining||0;
  if(remaining<=0)return[];
  const cp=currentPlayerData();
  const currentPos=cp.position;
  const visited=new Set(roomData.stepsThisTurn||[]);
  const lastVisited=cp.lastVisitedLocation;
  const valid=[];
  adjacency[currentPos].forEach(nid=>{
    if(visited.has(nid))return;
    // No-revisit location rule
    if(isPlace(nid) && nid===lastVisited)return;
    valid.push(nid);
  });
  return valid;
}

function renderValidMoves(){
  // Clear all valid highlights
  document.querySelectorAll('.node.valid').forEach(n=>n.classList.remove('valid'));
  if(!isMyTurn()||roomData.phase!=='flee')return;
  const valid=getValidMoves();
  valid.forEach(id=>{
    const node=document.getElementById('node-'+id);
    if(node) node.classList.add('valid');
  });
}

function onNodeClick(nodeId){
  if(!isMyTurn()||roomData.phase!=='flee')return;
  const valid=getValidMoves();
  if(!valid.includes(nodeId))return;
  const cp=currentPlayerData();
  const pid=currentPlayerId();
  const stepsThisTurn=[...(roomData.stepsThisTurn||[]),nodeId];
  const remaining=(roomData.stepsRemaining||0)-1;
  const updates={};
  updates['stepsThisTurn']=stepsThisTurn;
  updates['stepsRemaining']=remaining;
  updates[`players/${pid}/position`]=nodeId;
  // Track location visits
  if(isPlace(nodeId)){
    updates[`players/${pid}/lastVisitedLocation`]=nodeId;
  }
  roomRef.update(updates).then(()=>{
    // If no more moves or no valid moves from new position, auto-advance
    if(remaining<=0){
      setTimeout(()=>autoAdvanceFromFlee(),300);
    }
  });
}

function autoAdvanceFromFlee(){
  // Check if there are valid moves remaining
  const remaining=roomData.stepsRemaining||0;
  if(remaining<=0){
    advanceToHarvest();
    return;
  }
  const valid=getValidMoves();
  if(valid.length===0){
    advanceToHarvest();
  }
}

function endFlee(){
  advanceToHarvest();
}

function advanceToHarvest(){
  const cp=currentPlayerData();
  const locName=isPlace(cp.position)?positions[cp.position].name:'a step';
  addLog(`<span>${cp.name}</span> stops at ${locName}.`);
  roomRef.update({phase:'harvest',stepsRemaining:0});
}

// ============ INIT ============
window.addEventListener('load',()=>{
  document.getElementById('pw-input').focus();
});
</script>
