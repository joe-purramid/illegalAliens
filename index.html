<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;min-height:100vh;overflow-x:hidden}

.screen.active{display:flex}

h1.logo{font-family:'Creepster',cursive;font-size:52px;color:var(--green);text-shadow:3px 3px 0 var(--purple),-1px -1px 0 var(--pink),0 0 30px rgba(57,255,20,.3);letter-spacing:4px;transform:skewY(-1.5deg);margin-bottom:6px;text-align:center}

input[type=text],input[type=password],select{font-family:'Share Tech Mono',monospace;font-size:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:3px;outline:none;width:260px;text-align:center}

.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}

.board-wrap{position:relative;width:960px;height:840px;flex-shrink:0}

.building{position:absolute;pointer-events:none;z-index:1}
.place-label{position:absolute;z-index:3;pointer-events:none;font-family:'Russo One',sans-serif;white-space:nowrap}

.rules-link{position:fixed;top:10px;right:10px;z-index:100}

.rules-link a:hover{color:var(--green);border-color:var(--green)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--purple);color:#fff;font-family:'Russo One',sans-serif;font-size:13px;padding:10px 24px;border-radius:4px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}

.modal{background:var(--bg2);border:2px solid var(--purple);border-radius:8px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}

.pvp-panel{background:rgba(176,38,255,.05);border:1px solid var(--purple);border-radius:6px;padding:12px;margin:8px 0}
.pvp-panel h4{font-family:'Russo One',sans-serif;font-size:12px;color:var(--purple);letter-spacing:1px;margin-bottom:6px}

.opp-row{padding:8px 0;border-bottom:1px solid var(--border)}
.opp-row:last-child{border-bottom:none}
.opp-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}

.opp-header .opp-name{font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:1px}
.opp-organs{display:flex;flex-wrap:wrap;gap:2px 6px;font-size:11px;color:var(--dim)}

.elim-badge{display:inline-block;background:#444;color:#888;font-family:'Russo One',sans-serif;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;letter-spacing:1px;vertical-align:middle}
.active-turn{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;vertical-align:middle;box-shadow:0 0 6px var(--green)}
/* Vasquez polish */
.side-panel{border-left:3px solid var(--purple);position:relative;overflow:hidden}
.side-panel::before{content:'';position:absolute;top:0;right:0;width:40px;height:40px;background:linear-gradient(135deg,transparent 50%,rgba(176,38,255,.06) 50%);pointer-events:none}
.side-panel h3{text-shadow:1px 1px 0 rgba(0,0,0,.5);position:relative}

.node.location,.node.hospital{box-shadow:0 2px 8px rgba(0,0,0,.4)}
.node.step{transition:all .15s,transform .1s}
.node.step:hover{transform:scale(1.15)}
.node.step.valid{transform:scale(1.1)}
h1.logo{animation:logoGlitch 8s infinite}
@keyframes logoGlitch{0%,95%,100%{text-shadow:3px 3px 0 var(--purple),-1px -1px 0 var(--pink),0 0 30px rgba(57,255,20,.3)}96%{text-shadow:5px 2px 0 var(--pink),-3px -1px 0 var(--cyan),0 0 40px rgba(57,255,20,.5)}97%{text-shadow:3px 3px 0 var(--purple),-1px -1px 0 var(--pink),0 0 30px rgba(57,255,20,.3)}98%{text-shadow:-2px 4px 0 var(--green),2px -2px 0 var(--pink),0 0 50px rgba(176,38,255,.4)}99%{text-shadow:3px 3px 0 var(--purple),-1px -1px 0 var(--pink),0 0 30px rgba(57,255,20,.3)}}
.phase-indicator{text-shadow:0 0 10px rgba(57,255,20,.4)}
.btn{clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%);position:relative}

.meeple-wanted{position:absolute;width:16px;height:16px;z-index:11;pointer-events:none;background:var(--pink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:bold;border:1px solid #fff}

</style>

function eXY(a){return[CX+RX*Math.cos(d2r(a)),CY-RY*Math.sin(d2r(a))]}
function buildPos(){const p=[];for(let i=0;i<6;i++){const[x,y]=eXY(LA[i]);p.push({id:i,type:'location',name:LOC_NAMES[i],x,y})}p.push({id:6,type:'hospital',name:'HOSPITAL',x:CX,y:CY});for(let s=0;s<6;s++){const a1=LA[s],a2=LA[(s+1)%6];let d=a2-a1;if(d>180)d-=360;if(d<-180)d+=360;for(let i=1;i<=4;i++){const[x,y]=eXY(a1+d*i/5);p.push({id:7+s*4+(i-1),type:'step',x,y})}}for(let l=0;l<6;l++){const lx=p[l].x,ly=p[l].y;for(let i=1;i<=5;i++){const t=i/6;p.push({id:31+l*5+(i-1),type:'step',x:lx+(CX-lx)*t,y:ly+(CY-ly)*t})}}return p}
function buildAdj(){const a={};for(const p of P)a[p.id]=new Set();function lk(x,y){a[x].add(y);a[y].add(x)}for(let s=0;s<6;s++){const f=7+s*4;lk(s,f);for(let i=0;i<3;i++)lk(f+i,f+i+1);lk(f+3,(s+1)%6)}for(let l=0;l<6;l++){const f=31+l*5;lk(l,f);for(let i=0;i<4;i++)lk(f+i,f+i+1);lk(f+4,6)}return a}
const CP=[7+5*4+2,7+2*4+2,7+1*4+2,7+4*4+2,7+0*4+2,7+3*4+2];
const P=buildPos(),ADJ=buildAdj();
function isLoc(id){return id>=0&&id<=5}function isHosp(id){return id===6}function isPlace(id){return id<=6}

// Decks
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function genOD(){const c=[];for(let a=0;a<6;a++)for(let b=0;b<6;b++)c.push({type:'organ',primary:OT[a],secondary:OT[b]});return shuf([...c,...c])}
function genGD(){const c=[];for(let a=0;a<6;a++)for(let b=0;b<6;b++)c.push({type:'guile',alien:AG[a],authority:UG[b]});return shuf([...c,...c])}
function oLbl(c){if(!c||c.type!=='organ')return'?';const p=c.primary[0].toUpperCase()+c.primary.slice(1),s=c.secondary[0].toUpperCase()+c.secondary.slice(1);return c.primary===c.secondary?OI[c.primary]+' '+p+' x2':OI[c.primary]+' '+p+' / '+OI[c.secondary]+' '+s}
function gLbl(c){return c?c.alien+' / '+c.authority:'?'}

// Lobby
function refreshRooms(){db.ref('illegalAliens/rooms').once('value',snap=>{const list=document.getElementById('room-list'),rooms=snap.val();if(!rooms){list.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p>';return}list.innerHTML='';const now=Date.now(),STALE_MS=60*60*1000;
  Object.entries(rooms).forEach(([id,r])=>{
    if(r.status==='finished')return;
    // Check staleness: use lastActivity for playing games, created for waiting rooms
    const lastActive=r.lastActivity||r.created||0;
    if(now-lastActive>STALE_MS){db.ref('illegalAliens/rooms/'+id).update({status:'finished'});return}
    // Check if all players eliminated in a playing game
    if(r.status==='playing'&&r.players&&r.turnOrder){const alive=r.turnOrder.filter(pid=>r.players[pid]&&!r.players[pid].eliminated);if(alive.length<=1){db.ref('illegalAliens/rooms/'+id).update({status:'finished',winner:alive.length===1?alive[0]:null});return}}
    // Check if waiting room has 0 players
    if(r.status==='waiting'&&(!r.players||Object.keys(r.players).length===0)){db.ref('illegalAliens/rooms/'+id).remove();return}
    const n=r.players?Object.keys(r.players).length:0;const d=document.createElement('div');d.className='room-item';d.innerHTML='<div><span class="rname">'+(r.name||id)+'</span> <span class="rcount">'+n+'/6'+(r.status==='playing'?' \u{1F3AE}':'')+'</span></div><button class="btn small" onclick="joinRoom(\''+id+'\')" '+(r.status!=='waiting'||n>=6?'disabled':'')+'>JOIN</button>';list.appendChild(d)});
  if(!list.children.length)list.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p>'})}
function createRoom(){myName=document.getElementById('player-name').value.trim();if(!myName){toast('Enter a name first!');return}localStorage.setItem('ia_name',myName);const rid=gId().substr(0,6).toUpperCase();db.ref('illegalAliens/rooms/'+rid).set({name:'Room '+rid,host:myId,status:'waiting',created:Date.now(),players:{[myId]:{name:myName,color:null,ready:false}}}).then(()=>enterRoom(rid))}
function joinRoom(rid){myName=document.getElementById('player-name').value.trim();if(!myName){toast('Enter a name first!');return}localStorage.setItem('ia_name',myName);db.ref('illegalAliens/rooms/'+rid+'/players/'+myId).set({name:myName,color:null,ready:false}).then(()=>enterRoom(rid))}
function enterRoom(rid){currentRoom=rid;roomRef=db.ref('illegalAliens/rooms/'+rid);document.getElementById('room-code-display').textContent='ROOM: '+rid;localStorage.setItem('ia_room',rid);showScreen('room');roomRef.on('value',snap=>{RD=snap.val();if(!RD){leaveRoom();return}if(RD.status==='playing')initGame();else renderRoom()})}
function leaveRoom(){if(roomRef)roomRef.off();currentRoom=null;roomRef=null;RD=null;gL=[];localStorage.removeItem('ia_room');showScreen('lobby');refreshRooms()}

  const pl=document.getElementById('player-list');pl.innerHTML='';Object.entries(players).forEach(([pid,p])=>{const d=document.createElement('div');d.className='player-entry';d.innerHTML='<div class="player-dot" style="background:'+(p.color?COLORS[p.color].hex:'#333')+'"></div><span'+(pid===myId?' style="color:var(--green)"':'')+'>'+p.name+(pid===RD.host?' \u2B50':'')+'</span><span style="margin-left:auto;font-size:11px;color:'+(p.ready?'var(--green)':'var(--dim)')+';">'+(p.ready?'READY':'...')+'</span>';pl.appendChild(d)});

function startGame(){if(!RD)return;const pids=Object.keys(RD.players),np=pids.length;const order=[...pids];for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}
  const od=genOD(),gd=genGD();let oi=0,gi=0;const pu={};const sg=np>=5?3:2;
  order.forEach((pid,idx)=>{const h=[];h.push(od[oi++]);h.push(od[oi++]);for(let g=0;g<sg;g++)h.push(gd[gi++]);pu[pid]={...RD.players[pid],position:CP[idx],crashLanding:idx,organs:{intestine:0,heart:0,liver:0,lung:0,kidney:0,stomach:0},hand:h,lastVisitedLocation:-1,wanted:false,eliminated:false}});
  roomRef.update({status:'playing',players:pu,turnOrder:order,currentTurn:0,phase:'ready',movementValue:0,stepsThisTurn:[],groundOrgans:{},agentPosition:6,germs:{},organDeck:od.slice(oi),guileDeck:gd.slice(gi),handLimit:np>=5?5:4,globalEffects:{},pvpState:null,lastActivity:Date.now(),log:[{text:'Game started! '+RD.players[order[0]].name+' goes first.',time:Date.now()}]})}

// Label offsets: dx,dy from node center, text-align

// Building offsets from node center
const BLDG_OFF={0:{x:-35,y:-45},1:{x:-25,y:-45},2:{x:-22,y:-50},3:{x:-25,y:5},4:{x:5,y:-50},5:{x:5,y:-45},6:{x:10,y:-55}};
const LOC_PEN_TEXT={0:'-1 intestine',1:'-1 heart',2:'-1 liver',3:'-1 lung',4:'-1 kidney',5:'-1 stomach'};

function buildingSVG(type,color){
  const c=color,d='#1a1a3a',t='#222244',s='#15152a';

  if(type==='cyl')return'<svg viewBox="0 0 44 55" width="44" height="55"><ellipse cx="22" cy="48" rx="18" ry="6" fill="'+s+'" stroke="'+c+'" stroke-width="1"/><rect x="4" y="15" width="36" height="33" fill="'+d+'" stroke="'+c+'" stroke-width="1"/><ellipse cx="22" cy="15" rx="18" ry="6" fill="'+t+'" stroke="'+c+'" stroke-width="1"/><line x1="4" y1="15" x2="4" y2="48" stroke="'+c+'" stroke-width="1"/><line x1="40" y1="15" x2="40" y2="48" stroke="'+c+'" stroke-width="1"/><rect x="14" y="25" width="6" height="8" fill="'+c+'" opacity=".2" rx="1"/><rect x="24" y="25" width="6" height="8" fill="'+c+'" opacity=".2" rx="1"/><rect x="14" y="37" width="6" height="8" fill="'+c+'" opacity=".2" rx="1"/><rect x="24" y="37" width="6" height="8" fill="'+c+'" opacity=".2" rx="1"/></svg>';
  return'';
}

function renderBoard(){const svg=document.getElementById('board-svg'),c=document.getElementById('board-container');svg.innerHTML='';c.innerHTML='';const ns='http://www.w3.org/2000/svg';
  Object.entries(ADJ).forEach(([id,nb])=>{nb.forEach(nid=>{if(parseInt(id)<nid){const p1=P[parseInt(id)],p2=P[nid];const l=document.createElementNS(ns,'line');l.setAttribute('x1',p1.x);l.setAttribute('y1',p1.y);l.setAttribute('x2',p2.x);l.setAttribute('y2',p2.y);l.setAttribute('stroke','#1a1a3a');l.setAttribute('stroke-width','2');svg.appendChild(l)}})});
  P.forEach(p=>{
    if(p.type==='location'||p.type==='hospital'){
      const isH=p.type==='hospital';
      const nodeColor=isH?'var(--pink)':'var(--cyan)';
      const bType=BLDG_TYPE[p.id];
      const bOff=BLDG_OFF[p.id];
      const lOff=LABEL_OFF[p.id];
      // Building decoration
      const bd=document.createElement('div');bd.className='building';
      bd.innerHTML=buildingSVG(bType,isH?'#ff2a6d':'#00fff7');
      bd.style.left=(p.x+bOff.x)+'px';bd.style.top=(p.y+bOff.y)+'px';
      c.appendChild(bd);
      // Label billboard
      const lb=document.createElement('div');lb.className='place-label'+(isH?' hospital':'');
      lb.innerHTML='<span class="pl-name">'+p.name+'</span><span class="pl-penalty">'+(isH?'-1* all organs':LOC_PEN_TEXT[p.id]||'')+'</span>';
      lb.style.left=(p.x+lOff.x)+'px';lb.style.top=(p.y+lOff.y)+'px';lb.style.textAlign=lOff.a;
      c.appendChild(lb);
      // Clickable node (small square at location center)
      const d=document.createElement('div');d.id='node-'+p.id;
      d.className='node place-node'+(isH?' hospital-node':'');
      d.style.left=p.x+'px';d.style.top=p.y+'px';
      d.onclick=()=>onNodeClick(p.id);c.appendChild(d);
    } else {
      const d=document.createElement('div');d.id='node-'+p.id;
      d.className='node step';
      const ci=CP.indexOf(p.id);
      if(ci!==-1){d.classList.add('crash');if(RD&&RD.players){const ap=Object.values(RD.players).find(pl=>pl.crashLanding===ci);if(ap&&ap.color)d.style.borderColor=COLORS[ap.color].hex}}
      d.style.left=p.x+'px';d.style.top=p.y+'px';
      d.onclick=()=>onNodeClick(p.id);c.appendChild(d);
    }
  });
}function meepleSVG(color){const h=COLORS[color].hex;return'<svg viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg"><ellipse cx="12" cy="29" rx="7" ry="3" fill="rgba(0,0,0,.3)"/><path d="M12 2 C6 2 4 8 4 14 C4 18 6 22 8 25 L8 28 L16 28 L16 25 C18 22 20 18 20 14 C20 8 18 2 12 2Z" fill="'+h+'" stroke="#000" stroke-width=".5"/><circle cx="9" cy="12" r="3" fill="#fff"/><circle cx="15" cy="12" r="3" fill="#fff"/><circle cx="9" cy="12" r="1.8" fill="#111"/><circle cx="15" cy="12" r="1.8" fill="#111"/><ellipse cx="12" cy="18" rx="2" ry="1" fill="#000" opacity=".6"/></svg>'}

  })});
  if(RD.agentPosition!==undefined){const ap=P[RD.agentPosition];const d=document.createElement('div');d.className='meeple';d.innerHTML='<svg viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg"><ellipse cx="12" cy="29" rx="7" ry="3" fill="rgba(0,0,0,.3)"/><rect x="4" y="4" width="16" height="22" rx="3" fill="#222" stroke="#555" stroke-width=".5"/><rect x="6" y="8" width="5" height="3" rx="1" fill="red" opacity=".8"/><rect x="13" y="8" width="5" height="3" rx="1" fill="red" opacity=".8"/><rect x="8" y="16" width="8" height="2" rx="1" fill="#555"/><rect x="5" y="2" width="14" height="5" rx="2" fill="#333" stroke="#555" stroke-width=".5"/></svg>';d.style.left=(ap.x+12)+'px';d.style.top=(ap.y-28)+'px';d.style.opacity='.9';c.appendChild(d)}}
function renderGround(){document.querySelectorAll('.ground-badge').forEach(b=>b.remove());if(!RD||!RD.groundOrgans)return;const c=document.getElementById('board-container');
  Object.entries(RD.groundOrgans).forEach(([lid,organs])=>{const n=P[parseInt(lid)];if(!n)return;const tot=Object.values(organs).reduce((a,b)=>a+b,0);if(!tot)return;const bd=document.createElement('div');bd.className='ground-badge';bd.style.left=(n.x-30)+'px';bd.style.top=(n.y+22)+'px';Object.entries(organs).forEach(([o,cnt])=>{for(let i=0;i<cnt;i++){const p=document.createElement('div');p.className='ground-pip';p.style.background=OC[o];p.title=o;bd.appendChild(p)}});c.appendChild(bd)})}
function renderGerms(){document.querySelectorAll('.germs-badge').forEach(b=>b.remove());if(!RD||!RD.germs)return;const c=document.getElementById('board-container');

function renderOpponents(){
  const area=document.getElementById('opponents-area');if(!area)return;area.innerHTML='';
  const tgt=RD.turnOrder.length;
  RD.turnOrder.forEach(pid=>{
    if(pid===myId)return;

    let header='<div class="opp-header"><div class="opp-dot" style="background:'+COLORS[p.color].hex+'"></div><span class="opp-name" style="color:'+COLORS[p.color].hex+'">'+p.name+'</span>';

}

  if(!me||!me.hand||!me.hand.length){a.innerHTML='<p style="color:var(--dim);font-size:12px">No cards</p>';return}
  // Sort: organ cards first, then guile cards, preserving order within type
  const indexed=me.hand.map((card,idx)=>({card,idx}));
  indexed.sort((a,b)=>a.card.type===b.card.type?0:(a.card.type==='organ'?-1:1));
  indexed.forEach(({card,idx})=>{const d=document.createElement('div');d.className='card '+(card.type==='organ'?'organ-card':'guile-card');
    if(selCards.has(idx))d.classList.add('selected');
    let ttip='';
    if(card.type==='guile'){
      const tips={

// ===== GUILE CARD PLAY SYSTEM =====
function getGuileActions(){
  // Returns playable guile effects for the current player based on phase
  const me=myD();if(!me||!me.hand)return[];
  const phase=RD.phase,acts=[];
  me.hand.forEach((c,idx)=>{if(c.type!=='guile')return;
    // Alien effects (own turn only)
    if(isMT()){
      if(c.alien==='Teleporter!'&&phase==='set'&&!RD.movementValue)acts.push({idx,side:'alien',name:'Teleporter!',desc:'Move to any crash site before rolling'});
      if(c.alien==='Hollow Ween!'&&['ready','set','flee','harvest'].includes(phase))acts.push({idx,side:'alien',name:'Hollow Ween!',desc:'Double all SET! rolls for 1 round'});
      if(c.alien==='Immunity!'&&['ready','set','flee','harvest'].includes(phase))acts.push({idx,side:'alien',name:'Immunity!',desc:'Remove all Germs from a location'});
      // Computer Guidance/Tractor Beam handled via card selection during harvest
    }
    // Authority effects (own turn for proactive ones)
    if(isMT()){
      if(c.authority==='Germs!'&&['ready','set','flee','harvest'].includes(phase))acts.push({idx,side:'authority',name:'Germs!',desc:'Place at a location (-1 harvest)'});
      if(c.authority==='Neighborhood Watch!'&&['ready','set','flee','harvest'].includes(phase))acts.push({idx,side:'authority',name:'Neighborhood Watch!',desc:'Halve all SET! rolls for 1 round'});
      if(c.authority==='Men in Blarknap!'&&['ready','set','flee','harvest'].includes(phase))acts.push({idx,side:'authority',name:'Men in Blarknap!',desc:'Move the Agent one location'});
    }
  });
  return acts;
}

function playGuile(idx,side,name){
  const pid=cpId(),me=RD.players[pid],hand=[...me.hand];
  hand.splice(idx,1);selCards.clear();
  const u={};u['players/'+pid+'/hand']=hand;

  if(name==='Teleporter!'){
    // Show crash site selection
    showModal('<h3>TELEPORTER!</h3><p style="text-align:center;color:var(--dim);margin:12px 0">Choose a crash landing site:</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+
      CP.map((cid,i)=>'<button class="btn small" onclick="closeModal();execTeleport('+cid+')">L'+(i+1)+'</button>').join('')+'</div>');
    roomRef.update(u);addLog('<span>'+me.name+'</span> plays Teleporter!');return;
  }
  if(name==='Hollow Ween!'){
    const ge=RD.globalEffects||{};
    // Cancel Neighborhood Watch if active
    if(ge.neighborhoodWatch){ge.neighborhoodWatch=null}
    ge.hollowWeen={pid,expTurn:RD.currentTurn};
    u.globalEffects=ge;roomRef.update(u);addLog('<span>'+me.name+'</span> plays Hollow Ween! All SET! rolls doubled!');return;
  }
  if(name==='Neighborhood Watch!'){
    const ge=RD.globalEffects||{};
    if(ge.hollowWeen){ge.hollowWeen=null}
    ge.neighborhoodWatch={pid,expTurn:RD.currentTurn};
    u.globalEffects=ge;roomRef.update(u);addLog('<span>'+me.name+'</span> plays Neighborhood Watch! All SET! rolls halved!');return;
  }
  if(name==='Immunity!'){
    showModal('<h3>IMMUNITY!</h3><p style="text-align:center;color:var(--dim);margin:12px 0">Choose location to clear Germs:</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+
      LOC_NAMES.map((n,i)=>{const gc=(RD.germs&&RD.germs[i])||0;return'<button class="btn small" onclick="closeModal();execImmunity('+i+')" '+(gc?'':'disabled')+'>'+n+(gc?' ('+gc+')':' (0)')+'</button>'}).join('')+'</div>');
    roomRef.update(u);addLog('<span>'+me.name+'</span> plays Immunity!');return;
  }
  if(name==='Germs!'){
    showModal('<h3>GERMS!</h3><p style="text-align:center;color:var(--dim);margin:12px 0">Place Germs at a location (not Hospital):</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+
      LOC_NAMES.map((n,i)=>'<button class="btn small" onclick="closeModal();execGerms('+i+')">'+n+'</button>').join('')+'</div>');
    roomRef.update(u);addLog('<span>'+me.name+'</span> plays Germs!');return;
  }
  if(name==='Men in Blarknap!'){
    // Determine valid agent destinations
    const aPos=RD.agentPosition;let dests=[];
    if(aPos===6){dests=[0,1,2,3,4,5]}// From hospital: any outer location (first move or return)
    else{// From outer location: adjacent locations + hospital
      dests=[(aPos+1)%6,(aPos+5)%6,6];
    }
    showModal('<h3>MEN IN BLARKNAP!</h3><p style="text-align:center;color:var(--dim);margin:12px 0">Move the Agent to:</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+
      dests.map(d=>'<button class="btn small" onclick="closeModal();execAgent('+d+')">'+P[d].name+'</button>').join('')+'</div>');
    roomRef.update(u);addLog('<span>'+me.name+'</span> plays Men in Blarknap!');return;
  }
  roomRef.update(u);
}

function execImmunity(locId){const g=RD.germs||{};g[locId]=0;roomRef.update({germs:g});addLog('Germs cleared from '+LOC_NAMES[locId]+'!')}

function execAgent(destId){
  // Move agent, check for aliens on path and at destination
  const oldPos=RD.agentPosition;
  // Find aliens at destination or on the spoke/ring between old and new
  const affected=[];
  Object.entries(RD.players).forEach(([pid,p])=>{
    if(p.eliminated)return;
    if(p.position===destId)affected.push(pid);
    // Check intermediate steps (simplified: just destination for now)
  });
  const u={agentPosition:destId};
  if(affected.length){
    u.agentEncounter={aliens:affected,currentIdx:0};
    u.phase='agent_encounter';
  }
  roomRef.update(u);
  addLog('Agent moves to '+P[destId].name+'!'+(affected.length?' Aliens encountered!':''));
}

function checkGlobalExpiry(){
  const ge=RD.globalEffects;if(!ge)return;let changed=false;
  if(ge.hollowWeen&&ge.hollowWeen.expTurn===RD.currentTurn&&ge.hollowWeen.pid===cpId()){ge.hollowWeen=null;changed=true;addLog('Hollow Ween! effect expires.')}
  if(ge.neighborhoodWatch&&ge.neighborhoodWatch.expTurn===RD.currentTurn&&ge.neighborhoodWatch.pid===cpId()){ge.neighborhoodWatch=null;changed=true;addLog('Neighborhood Watch! effect expires.')}
  if(changed)roomRef.child('globalEffects').set(ge);
}

function drawReady(t1,t2){
  const pid=cpId(),p=RD.players[pid],h=p.hand?[...p.hand]:[];

  function draw(t){if(t==='organ'&&od.length)return od.shift();if(t==='guile'&&gd.length)return gd.shift();if(od.length)return od.shift();if(gd.length)return gd.shift();return null}
  const c1=draw(t1),c2=draw(t2);if(c1)h.push(c1);if(c2)h.push(c2);
  const u={};u['players/'+pid+'/hand']=h;u.organDeck=od.length?od:genOD();u.guileDeck=gd.length?gd:genGD();u.phase='set';
  roomRef.update(u);addLog('<span>'+p.name+'</span> draws 2 cards.')}

function execDataHack(mode){
  const pid=cpId(),me=RD.players[pid],hand=[...me.hand];
  // Find and remove Data Hacking card
  const hackIdx=hand.findIndex(c=>c.type==='guile'&&c.alien==='Data Hacking!');
  if(hackIdx===-1)return;
  hand.splice(hackIdx,1);
  const passed=getPassedAliens();
  const u={};u['players/'+pid+'/hand']=hand;
  
  if(mode==='one'){
    const target=passed[0];const tHand=RD.players[target].hand?[...RD.players[target].hand]:[];
    const stolen=[];
    for(let i=0;i<2&&tHand.length;i++){const ri=Math.floor(Math.random()*tHand.length);stolen.push(tHand.splice(ri,1)[0])}
    hand.push(...stolen);
    u['players/'+pid+'/hand']=hand;u['players/'+target+'/hand']=tHand;
    addLog('<span>'+me.name+'</span> hacks '+RD.players[target].name+' and steals '+stolen.length+' cards!');
  } else if(mode==='split'&&passed.length>=2){
    for(let i=0;i<2&&i<passed.length;i++){
      const target=passed[i];const tHand=RD.players[target].hand?[...RD.players[target].hand]:[];
      if(tHand.length){const ri=Math.floor(Math.random()*tHand.length);hand.push(tHand.splice(ri,1)[0]);u['players/'+target+'/hand']=tHand}
    }
    u['players/'+pid+'/hand']=hand;
    addLog('<span>'+me.name+'</span> hacks '+passed.slice(0,2).map(p=>RD.players[p].name).join(' and ')+', stealing 1 card each!');
  }
  u.phase='harvest';selCards.clear();roomRef.update(u);
}

function calcMods(locId,organ,isH,th,tq){
  let mod=0,det=[];
  if(isH){mod-=1;det.push('Hospital: -1');mod-=th.length;det.push('Types('+th.length+'): -'+th.length)}
  else{const pen=LP[locId];if(pen&&pen[organ]){mod+=pen[organ];det.push('Location: '+pen[organ])}}
  if(RD.agentPosition===locId){mod-=1;det.push('Agent: -1')}
  const germs=(RD.germs&&RD.germs[locId])||0;if(germs){mod-=germs;det.push('Germs: -'+germs)}
  const go=RD.groundOrgans&&RD.groundOrgans[locId]?RD.groundOrgans[locId]:{};
  if(isH){th.forEach(o=>{const gc=go[o]||0;if(gc){mod+=gc;det.push('Ground '+o+': +'+gc)}})}
  else{const gc=go[organ]||0;if(gc){mod+=gc;det.push('Ground: +'+gc)}}
  // Organ cards
  const hand=myD().hand||[];let cb=0;
  selCards.forEach(idx=>{const c=hand[idx];if(c&&c.type==='organ'){
    if(isH){th.forEach(o=>{if(c.primary===o&&c.secondary===o)cb+=2;else if(c.primary===o||c.secondary===o)cb+=1})}

  });

function pvpPlayCard(idx,modVal){
  const pvp=RD.pvpState;if(!pvp)return;
  const isAttacker=pvp.attackerId===myId;
  const pid=myId,hand=[...RD.players[pid].hand];
  const card=hand[idx];hand.splice(idx,1);
  const u={};u['players/'+pid+'/hand']=hand;
  
  if(isAttacker){
    let bonus=0;
    if(card.alien==='Computer Guidance!')bonus=1;
    else if(card.alien==='Tractor Beam!')bonus=2;
    else bonus=1; // generic
    u['pvpState/aMod']=(pvp.aMod||0)+bonus;
    u['pvpState/turn']='target';
    u['pvpState/lastPass']=false;
    addLog('<span>'+RD.players[pid].name+'</span> plays '+card.alien+' (+'+bonus+')');
  } else {
    u['pvpState/tMod']=(pvp.tMod||0)+modVal;
    u['pvpState/turn']='attacker';
    u['pvpState/lastPass']=false;
    addLog('<span>'+RD.players[pid].name+'</span> plays '+card.authority+' ('+modVal+' to attacker)');
  }
  selCards.clear();roomRef.update(u);
}

function pvpPass(){
  const pvp=RD.pvpState;if(!pvp)return;
  const isAttacker=pvp.attackerId===myId;
  if(pvp.lastPass){
    // Both passed, resolve
    resolvePvp();
  } else {
    const u={};
    u['pvpState/turn']=isAttacker?'target':'attacker';
    u['pvpState/lastPass']=true;
    addLog('<span>'+myD().name+'</span> passes.');
    roomRef.update(u);
  }
}

function resolvePvp(){
  const pvp=RD.pvpState;if(!pvp)return;
  const aRoll=Math.floor(Math.random()*6)+1;
  const tRoll=Math.floor(Math.random()*6)+1;
  const netMod=(pvp.aMod||0)+(pvp.tMod||0); // tMod is already negative
  const aTotal=aRoll+netMod;
  const tTotal=tRoll;
  const attacker=RD.players[pvp.attackerId],target=RD.players[pvp.targetId];
  const u={};
  
  addLog(attacker.name+' rolls '+aRoll+(netMod?'('+(netMod>=0?'+':'')+netMod+')='+aTotal:'')+' vs '+target.name+' rolls '+tRoll);
  
  if(aTotal>tTotal){
    // Attacker wins - steal 1 organ
    const organ=pvp.organ;
    u['players/'+pvp.attackerId+'/organs/'+organ]=Math.min(6,(attacker.organs[organ]||0)+1);
    u['players/'+pvp.targetId+'/organs/'+organ]=Math.max(0,(target.organs[organ]||0)-1);
    addLog('\u2705 <span>'+attacker.name+'</span> steals 1 '+organ+' from '+target.name+'!');
    u.phase='hide';u.pvpState=null;
  } else {
    // Target wins or ties - target gets free SET roll and movement
    const freeRoll=Math.floor(Math.random()*6)+1;
    addLog('\u274C <span>'+target.name+'</span> defends! Free escape roll: '+freeRoll+'!');
    u.phase='defender_move';
    u.pvpState=null;
    u.defenderMove={defenderId:pvp.targetId,stepsRemaining:freeRoll,stepsThisTurn:[target.position],originalTurnOwner:cpId()};
  }
  selCards.clear();roomRef.update(u);
}

function getDefenderReachable(){
  const dm=RD.defenderMove;if(!dm)return new Map();
  const steps=dm.stepsRemaining||0;if(steps<=0)return new Map();
  const defender=RD.players[dm.defenderId];
  const start=defender.position,lv=defender.lastVisitedLocation;
  const visitedInTurn=new Set(dm.stepsThisTurn||[]);
  const queue=[{pos:start,left:steps,path:[],visited:new Set(visitedInTurn)}];
  const reachable=new Map();
  while(queue.length){
    const{pos,left,path,visited}=queue.shift();
    if(left<=0)continue;
    ADJ[pos].forEach(nid=>{
      if(visited.has(nid))return;
      if(isPlace(nid)&&nid===lv)return;
      const newPath=[...path,nid];
      const newVis=new Set(visited);newVis.add(nid);
      if(!reachable.has(nid)||newPath.length<reachable.get(nid).path.length){
        reachable.set(nid,{path:newPath,left:left-1});
      }
      queue.push({pos:nid,left:left-1,path:newPath,visited:newVis});
    });
  }
  return reachable;
}

function endDefenderMove(){
  const dm=RD.defenderMove;if(!dm)return;
  const defender=RD.players[dm.defenderId];
  addLog('<span>'+defender.name+'</span> finishes escape move.');
  roomRef.update({phase:'hide',defenderMove:null});
}

  const afterD=hand.length-selCards.size,willD=Math.max(0,lim-afterD);
  let h='<p style="text-align:center;color:var(--dim);font-size:12px;margin:8px 0">Discard & draw up to '+lim+'</p>';
  if(selCards.size)h+='<p style="text-align:center;color:var(--pink);font-size:12px">'+selCards.size+' to discard</p>';
  if(willD||selCards.size)h+='<p style="text-align:center;color:var(--dim);font-size:11px">After: '+afterD+' \u2192 draw '+willD+'</p>';
  const od=(RD.organDeck||[]).length,gd=(RD.guileDeck||[]).length;
  if(willD>0)h+='<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0"><button class="btn small" onclick="execHide(\'organ\')">ORGAN ('+od+')</button><button class="btn small yellow" onclick="execHide(\'guile\')">GUILE ('+gd+')</button><button class="btn small pink" onclick="execHide(\'mix\')">MIX</button></div>';
  else h+='<div style="text-align:center;margin:8px 0"><button class="btn small" onclick="execHide(\'none\')">END TURN</button></div>';
  ctrl.innerHTML=h}

function execHide(pref){
  const pid=cpId(),me=RD.players[pid],hand=me.hand?[...me.hand]:[],lim=RD.handLimit||4;
  [...selCards].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));const dc=selCards.size;
  const need=Math.max(0,lim-hand.length);
  const od=RD.organDeck?[...RD.organDeck]:[],gd=RD.guileDeck?[...RD.guileDeck]:[];
  let dO=0,dG=0;
  for(let i=0;i<need;i++){let c=null;
    if(pref==='organ'&&od.length)c=od.shift();else if(pref==='guile'&&gd.length)c=gd.shift();
    else if(pref==='mix'){if(i%2===0&&od.length)c=od.shift();else if(gd.length)c=gd.shift();else if(od.length)c=od.shift()}
    if(!c&&od.length)c=od.shift();if(!c&&gd.length)c=gd.shift();
    if(!c){od.push(...genOD());gd.push(...genGD());c=od.shift()}
    if(c){hand.push(c);c.type==='organ'?dO++:dG++}}
  const u={};u['players/'+pid+'/hand']=hand;u.organDeck=od;u.guileDeck=gd;selCards.clear();
  roomRef.update(u).then(()=>{addLog('<span>'+me.name+'</span>'+(dc?' discards '+dc:'')+(dO+dG?', draws '+(dO+dG):'')+(dc||dO+dG?'.':'')+' Turn ends.');nextTurn()})}

function nextTurn(){let n=(RD.currentTurn+1)%RD.turnOrder.length,s=0;
  while(RD.players[RD.turnOrder[n]].eliminated&&s<10){n=(n+1)%RD.turnOrder.length;s++}
  addLog('<span>'+RD.players[RD.turnOrder[n]].name+"</span>'s turn begins.");
  roomRef.update({currentTurn:n,phase:'ready',movementValue:0,stepsThisTurn:[],stepsRemaining:0,lastActivity:Date.now()})}

// Movement - BFS to find all reachable destinations
function getReachablePositions(){
  if(!RD||RD.phase!=='flee'||!isMT())return[];
  const steps=RD.stepsRemaining||0;if(steps<=0)return[];
  const cp=cpD(),start=cp.position,lv=cp.lastVisitedLocation;
  const visitedInTurn=new Set(RD.stepsThisTurn||[]);
  // BFS: state = {pos, stepsLeft, path, visited}
  const queue=[{pos:start,left:steps,path:[],visited:new Set(visitedInTurn)}];
  const reachable=new Map(); // posId -> {path, stepsLeft}
  while(queue.length){
    const{pos,left,path,visited}=queue.shift();
    if(left<=0)continue;
    ADJ[pos].forEach(nid=>{
      if(visited.has(nid))return;
      if(isPlace(nid)&&nid===lv)return;
      const newPath=[...path,nid];
      const newVis=new Set(visited);newVis.add(nid);
      // This is a reachable position (must move at least 1)
      if(!reachable.has(nid)||newPath.length<reachable.get(nid).path.length){
        reachable.set(nid,{path:newPath,left:left-1});
      }
      queue.push({pos:nid,left:left-1,path:newPath,visited:newVis});
    });
  }
  return reachable;
}

function showMovePreview(steps){
  document.querySelectorAll('.node.preview').forEach(n=>n.classList.remove('preview'));
  if(!isMT()||!steps)return;
  const cp=cpD(),start=cp.position,lv=cp.lastVisitedLocation;
  const queue=[{pos:start,left:steps,visited:new Set([start])}];
  const reachable=new Set();
  while(queue.length){
    const{pos,left,visited}=queue.shift();
    if(left<=0)continue;
    ADJ[pos].forEach(nid=>{
      if(visited.has(nid))return;
      if(isPlace(nid)&&nid===lv)return;
      reachable.add(nid);
      const nv=new Set(visited);nv.add(nid);
      queue.push({pos:nid,left:left-1,visited:nv});
    });
  }
  reachable.forEach(id=>{const n=document.getElementById('node-'+id);if(n)n.classList.add('preview')});
}

function renderValidMoves(){
  document.querySelectorAll('.node.valid').forEach(n=>n.classList.remove('valid'));
  document.querySelectorAll('.node.preview').forEach(n=>n.classList.remove('preview'));
  if(RD.phase==='flee'&&isMT()){
    const reachable=getReachablePositions();
    reachable.forEach((_,id)=>{const n=document.getElementById('node-'+id);if(n)n.classList.add('valid')});
  } else if(RD.phase==='defender_move'&&isDefender()){
    const reachable=getDefenderReachable();
    reachable.forEach((_,id)=>{const n=document.getElementById('node-'+id);if(n)n.classList.add('valid')});
  }
}

function onNodeClick(nid){
  // Normal FLEE movement
  if(isMT()&&RD.phase==='flee'){
    const reachable=getReachablePositions();
    if(!reachable.has(nid))return;
    const{path}=reachable.get(nid);
    const pid=cpId(),stepsThisTurn=[...(RD.stepsThisTurn||[]),...path];
    const remaining=(RD.stepsRemaining||0)-path.length;
    const u={stepsThisTurn,stepsRemaining:remaining};
    u['players/'+pid+'/position']=nid;
    let lastLoc=cpD().lastVisitedLocation;
    path.forEach(step=>{if(isPlace(step))lastLoc=step});
    u['players/'+pid+'/lastVisitedLocation']=lastLoc;
    roomRef.update(u).then(()=>{if(remaining<=0)setTimeout(advanceFromFlee,300)});
    return;
  }
  // Defender escape movement
  if(RD.phase==='defender_move'&&isDefender()){
    const reachable=getDefenderReachable();
    if(!reachable.has(nid))return;
    const{path}=reachable.get(nid);
    const dm=RD.defenderMove;
    const pid=dm.defenderId;
    const stepsThisTurn=[...(dm.stepsThisTurn||[]),...path];
    const remaining=(dm.stepsRemaining||0)-path.length;
    const u={};
    u['defenderMove/stepsThisTurn']=stepsThisTurn;
    u['defenderMove/stepsRemaining']=remaining;
    u['players/'+pid+'/position']=nid;
    let lastLoc=RD.players[pid].lastVisitedLocation;
    path.forEach(step=>{if(isPlace(step))lastLoc=step});
    u['players/'+pid+'/lastVisitedLocation']=lastLoc;
    roomRef.update(u).then(()=>{if(remaining<=0)setTimeout(endDefenderMove,300)});
    return;
  }
}
function endFlee(){advanceFromFlee()}
function advanceFromFlee(){
  const cp=cpD(),nm=isPlace(cp.position)?P[cp.position].name:'a step';
  addLog('<span>'+cp.name+'</span> stops at '+nm+'.');selCards.clear();
  const pid=cpId();
  const passed=getPassedAliens();
  
  // Check for passive Sabotage triggers from passed aliens
  let sabotageFired=false;
  const cpHand=cp.hand?[...cp.hand]:[];
  const u={stepsRemaining:0};
  
  passed.forEach(opid=>{
    if(sabotageFired)return; // Only one sabotage can trigger per flee
    const op=RD.players[opid];if(!op||!op.hand)return;
    const sabIdx=op.hand.findIndex(c=>c.type==='guile'&&c.authority==='Sabotage!');
    if(sabIdx!==-1){
      // Sabotage triggers! Remove card from opponent, active player discards 2 random
      sabotageFired=true;
      const opHand=[...op.hand];opHand.splice(sabIdx,1);
      u['players/'+opid+'/hand']=opHand;
      const discarded=[];
      for(let i=0;i<2&&cpHand.length;i++){const ri=Math.floor(Math.random()*cpHand.length);discarded.push(cpHand.splice(ri,1)[0])}
      u['players/'+pid+'/hand']=cpHand;
      addLog('<span>'+op.name+'</span> triggers Sabotage! <span>'+cp.name+'</span> discards '+discarded.length+' cards!');
    }
  });
  
  // Check if active player has Data Hacking for flee_resolve
  const hasHack=cpHand.some(c=>c.type==='guile'&&c.alien==='Data Hacking!');
  if(passed.length&&hasHack){
    u.phase='flee_resolve';
  } else {
    u.phase='harvest';
  }
  roomRef.update(u);
}

// Abandon
function confirmAbandon(){showModal('<h3>ABANDON GAME?</h3><p style="text-align:center;color:var(--dim);margin:12px 0">You will be removed and cannot rejoin.</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn pink" onclick="closeModal();abandonGame()">ABANDON</button><button class="btn small" onclick="closeModal()">CANCEL</button></div>')}
function abandonGame(){if(!roomRef||!RD)return;const me=RD.players[myId];if(me)addLog('<span>'+me.name+'</span> has abandoned the game.');
  if(RD.status==='playing'&&RD.turnOrder){const was=RD.turnOrder[RD.currentTurn]===myId;roomRef.child('players/'+myId+'/eliminated').set(true);
    // Check if all players are now eliminated
    const remaining=RD.turnOrder.filter(pid=>pid!==myId&&!RD.players[pid].eliminated);
    if(remaining.length<=1){
      // Game over — last player standing wins (or nobody wins)
      if(remaining.length===1){addLog('<span>'+RD.players[remaining[0]].name+'</span> wins by default — all others abandoned!');roomRef.update({status:'finished',winner:remaining[0]})}
      else{addLog('All players abandoned. Game over.');roomRef.update({status:'finished',winner:null})}
    } else if(was){
      let n=(RD.currentTurn+1)%RD.turnOrder.length,s=0;while(s<10){const p=RD.turnOrder[n];if(p!==myId&&!RD.players[p].eliminated)break;n=(n+1)%RD.turnOrder.length;s++}
      roomRef.update({currentTurn:n,phase:'ready',movementValue:0,stepsThisTurn:[],stepsRemaining:0,pvpState:null,agentEncounter:null,lastActivity:Date.now()})}}
  else roomRef.child('players/'+myId).remove();leaveRoom()}

window.addEventListener('load',()=>{const sr=localStorage.getItem('ia_room');
  if(sr){db.ref('illegalAliens/rooms/'+sr).once('value',snap=>{const d=snap.val();if(d&&d.players&&d.players[myId]&&d.status!=='finished'){myName=d.players[myId].name;enterRoom(sr)}else{localStorage.removeItem('ia_room');document.getElementById('pw-input').focus()}})}
  else document.getElementById('pw-input').focus()});
</script>
