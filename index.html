<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLEGAL ALIENS</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --bg2: #111122;
  --bg3: #1a1a2e;
  --green: #39ff14;
  --pink: #ff2a6d;
  --purple: #b026ff;
  --yellow: #ffe600;
  --cyan: #00fff7;
  --text: #d0d0e0;
  --dim: #6a6a8a;
  --border: #2a2a4a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);pointer-events:none;z-index:9999}

.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.screen.active{display:flex}
.game-screen.active{display:flex;flex-direction:row;justify-content:center;align-items:flex-start;flex-wrap:wrap;min-height:100vh;padding:10px;gap:12px}

h1.logo{font-family:'Creepster',cursive;font-size:52px;color:var(--green);text-shadow:3px 3px 0 var(--purple),-1px -1px 0 var(--pink),0 0 30px rgba(57,255,20,0.3);letter-spacing:4px;transform:skewY(-1.5deg);margin-bottom:6px;text-align:center}
.sub{font-family:'Russo One',sans-serif;font-size:11px;color:var(--purple);letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:30px}
.btn{font-family:'Russo One',sans-serif;font-size:13px;padding:10px 24px;border:2px solid var(--green);background:transparent;color:var(--green);cursor:pointer;letter-spacing:2px;transition:all .2s;border-radius:3px;text-transform:uppercase}
.btn:hover{background:var(--green);color:var(--bg);box-shadow:0 0 20px rgba(57,255,20,0.3)}
.btn:disabled{opacity:0.3;cursor:default;background:transparent;color:var(--green);box-shadow:none}
.btn.pink{border-color:var(--pink);color:var(--pink)}
.btn.pink:hover{background:var(--pink);color:#fff}
.btn.yellow{border-color:var(--yellow);color:var(--yellow)}
.btn.yellow:hover{background:var(--yellow);color:var(--bg)}
.btn.small{font-size:11px;padding:6px 14px}
input[type=text],input[type=password],select{font-family:'Share Tech Mono',monospace;font-size:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:3px;outline:none;width:260px;text-align:center}
input:focus,select:focus{border-color:var(--purple);box-shadow:0 0 10px rgba(176,38,255,0.2)}
select{cursor:pointer;appearance:none}
select option{background:var(--bg2);color:var(--text)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:20px;max-width:400px;width:100%}
.error{color:var(--pink);font-size:12px;margin-top:8px;text-align:center}
.gap{height:12px}
.center{text-align:center}

.room-list{max-height:240px;overflow-y:auto;margin:12px 0}
.room-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:3px;margin:6px 0;background:rgba(255,255,255,0.02)}
.room-item .rname{color:var(--cyan);font-weight:bold}
.room-item .rcount{color:var(--dim);font-size:12px}

.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.color-pick{width:60px;height:60px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:24px}
.color-pick:hover{transform:scale(1.1)}
.color-pick.selected{border-color:#fff;box-shadow:0 0 15px rgba(255,255,255,0.3)}
.color-pick.taken{opacity:0.2;cursor:default}
.player-list{margin:12px 0}
.player-entry{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
.player-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}

.board-wrap{position:relative;width:960px;height:840px;flex-shrink:0}
.board-svg{position:absolute;top:0;left:0;width:100%;height:100%}
.board-container{position:absolute;top:0;left:0;width:100%;height:100%}
.node{position:absolute;border-radius:4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;z-index:2}
.node.step{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);margin-left:-14px;margin-top:-14px}
.node.step:hover{border-color:var(--purple);background:rgba(176,38,255,0.15)}
.node.step.valid{border-color:var(--green);background:rgba(57,255,20,0.12);box-shadow:0 0 8px rgba(57,255,20,0.3);animation:pulse 1s infinite}
.node.step.crash{border-style:dashed;border-width:2px}
.node.location{min-width:160px;height:50px;padding:0 16px;background:var(--bg2);border:2px solid var(--cyan);margin-left:-80px;margin-top:-25px;font-family:'Russo One',sans-serif;font-size:22px;color:var(--cyan);letter-spacing:1px;border-radius:6px;z-index:3;white-space:nowrap}
.node.location:hover{border-color:var(--green);color:var(--green)}
.node.location.valid{border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(57,255,20,0.3);animation:pulse 1s infinite}
.node.hospital{width:120px;height:52px;background:var(--bg2);border:2px solid var(--pink);margin-left:-60px;margin-top:-26px;font-family:'Creepster',cursive;font-size:22px;color:var(--pink);border-radius:8px;z-index:3}
.node.hospital:hover{border-color:var(--green);color:var(--green)}
.node.hospital.valid{border-color:var(--green);color:var(--green);box-shadow:0 0 12px rgba(57,255,20,0.3);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

.ground-badge{position:absolute;display:flex;gap:2px;z-index:4;pointer-events:none;flex-wrap:wrap;max-width:60px}
.ground-pip{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,0.3)}
.germs-badge{position:absolute;min-width:18px;height:18px;background:var(--pink);border-radius:9px;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:4;pointer-events:none}

.meeple{position:absolute;width:22px;height:30px;z-index:10;pointer-events:none;transition:left .4s ease,top .4s ease;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5))}

.sidebar{width:340px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;max-height:100vh;overflow-y:auto}
.side-panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:14px}
.side-panel h3{font-family:'Creepster',cursive;font-size:20px;color:var(--pink);margin-bottom:8px}
.side-panel h4{font-family:'Russo One',sans-serif;font-size:12px;color:var(--yellow);margin:8px 0 4px;letter-spacing:1px}
.phase-indicator{font-family:'Creepster',cursive;font-size:24px;color:var(--green);text-align:center;margin:4px 0}
.turn-info{text-align:center;font-size:13px;color:var(--dim);margin-bottom:4px}
.dice-display{font-size:48px;text-align:center;margin:8px 0;cursor:pointer;user-select:none;transition:transform .1s}
.dice-display:hover{transform:scale(1.1)}
.dice-display.rolling{animation:diceRoll .1s infinite}
@keyframes diceRoll{0%{transform:rotate(0deg)}25%{transform:rotate(10deg)}50%{transform:rotate(-10deg)}75%{transform:rotate(5deg)}100%{transform:rotate(0deg)}}
.mv-display{text-align:center;font-family:'Russo One',sans-serif;font-size:16px;color:var(--green);margin:4px 0}
.organ-table{width:100%;border-collapse:collapse;margin:6px 0}
.organ-table td{padding:5px 6px;font-size:14px;border-bottom:1px solid var(--border)}
.organ-table td:first-child{color:var(--cyan)}
.organ-table td:last-child{text-align:right;color:var(--green)}
.log{max-height:140px;overflow-y:auto;font-size:11px;color:var(--dim);line-height:1.6}
.log .entry{padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.log .entry span{color:var(--yellow)}

.hand-area{display:flex;flex-direction:column;gap:4px;margin:8px 0}
.card{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:4px;background:rgba(255,255,255,0.03);cursor:pointer;transition:all .15s;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.card:hover{border-color:var(--purple);background:rgba(176,38,255,0.1)}
.card.selected{border-color:var(--green);background:rgba(57,255,20,0.1);box-shadow:0 0 6px rgba(57,255,20,0.2)}
.card.organ-card{border-left:3px solid var(--cyan)}
.card.guile-card{border-left:3px solid var(--yellow)}
.card .card-label{font-size:10px;color:var(--dim)}
.card .card-value{color:var(--cyan);font-size:11px}
.card .card-value.guile{color:var(--yellow)}

.harvest-panel{margin:8px 0}
.harvest-row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap}
.harvest-row label{font-size:12px;color:var(--dim);min-width:55px}
.harvest-row select{width:auto;min-width:120px;font-size:12px;padding:6px 10px}
.harvest-row input[type=number]{width:55px;font-size:13px;padding:6px;text-align:center;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:3px}
.harvest-summary{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:10px;margin:8px 0;font-size:12px;line-height:1.8}
.harvest-summary .hs-row{display:flex;justify-content:space-between}
.harvest-summary .hs-label{color:var(--dim)}
.harvest-summary .hs-val{color:var(--green)}
.harvest-summary .hs-val.bad{color:var(--pink)}

.rules-link{position:fixed;top:10px;right:10px;z-index:100}
.rules-link a{color:var(--dim);font-size:11px;text-decoration:none;border:1px solid var(--border);padding:4px 10px;border-radius:3px;transition:all .2s}
.rules-link a:hover{color:var(--green);border-color:var(--green)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--purple);color:#fff;font-family:'Russo One',sans-serif;font-size:13px;padding:10px 24px;border-radius:4px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border:2px solid var(--purple);border-radius:8px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{font-family:'Creepster',cursive;font-size:22px;color:var(--green);margin-bottom:12px;text-align:center}
</style>
</head>
<body>
<div class="rules-link"><a href="rules.html" target="_blank">📋 RULES</a></div>
<div id="toast" class="toast"></div>
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-content"></div></div>

<div id="screen-password" class="screen active">
  <h1 class="logo">ILLEGAL ALIENS</h1>
  <div class="sub">Phat Phlamingo Games</div>
  <div class="panel center">
    <p style="margin-bottom:12px;color:var(--dim)">Enter password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" autofocus>
    <div class="gap"></div>
    <button class="btn" onclick="checkPassword()">ENTER</button>
    <div id="pw-error" class="error" style="display:none">Wrong password, human.</div>
  </div>
</div>

<div id="screen-lobby" class="screen">
  <h1 class="logo">ILLEGAL ALIENS</h1>
  <div class="sub">Choose your invasion</div>
  <div class="panel">
    <h4 style="color:var(--cyan);font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:1px;margin-bottom:8px">YOUR NAME</h4>
    <input type="text" id="player-name" placeholder="Alien name" maxlength="16">
    <div class="gap"></div>
    <div style="display:flex;gap:8px">
      <button class="btn small" onclick="createRoom()">CREATE ROOM</button>
      <button class="btn small pink" onclick="refreshRooms()">REFRESH</button>
    </div>
    <div class="room-list" id="room-list"><p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p></div>
  </div>
</div>

<div id="screen-room" class="screen">
  <h1 class="logo" style="font-size:36px">INVASION STAGING</h1>
  <div class="sub" id="room-code-display">ROOM: ---</div>
  <div class="panel" style="max-width:500px">
    <h4 style="color:var(--cyan);font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:1px">CHOOSE YOUR COLOR</h4>
    <div class="color-grid" id="color-grid"></div>
    <h4 style="color:var(--cyan);font-family:'Russo One',sans-serif;font-size:12px;letter-spacing:1px">CREW</h4>
    <div class="player-list" id="player-list"></div>
    <div class="gap"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" id="ready-btn" onclick="toggleReady()" disabled>READY</button>
      <button class="btn yellow" id="start-btn" onclick="startGame()" style="display:none">LAUNCH</button>
      <button class="btn pink small" onclick="leaveWaitingRoom()">LEAVE</button>
    </div>
  </div>
</div>

<div id="screen-game" class="screen game-screen">
  <div class="board-wrap" id="board-wrap">
    <svg class="board-svg" id="board-svg"></svg>
    <div class="board-container" id="board-container"></div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="side-panel">
      <div class="turn-info" id="turn-info">Waiting...</div>
      <div class="phase-indicator" id="phase-indicator">—</div>
      <div id="phase-controls"></div>
    </div>
    <div class="side-panel" id="hand-panel">
      <h3>Your Hand</h3>
      <div class="hand-area" id="hand-area"></div>
    </div>
    <div class="side-panel">
      <h3>Your Organs</h3>
      <table class="organ-table" id="my-organs"><tbody></tbody></table>
    </div>
    <div class="side-panel">
      <h3>Log</h3>
      <div class="log" id="game-log"></div>
    </div>
    <div style="text-align:center;padding:8px 0">
      <button class="btn small pink" onclick="confirmAbandon()">🚪 ABANDON GAME</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBaVFJSGVpFMmMmiOcz3rsFgnGRbVfujCE",authDomain:"prismadice-7866d.firebaseapp.com",databaseURL:"https://prismadice-7866d-default-rtdb.firebaseio.com",projectId:"prismadice-7866d"});
const db=firebase.database();

const COLORS={red:{hex:'#ff4444'},yellow:{hex:'#ffdd00'},orange:{hex:'#ff8800'},green:{hex:'#44ff44'},blue:{hex:'#4488ff'},purple:{hex:'#cc66ff'}};
const COLOR_ORDER=['red','yellow','orange','green','blue','purple'];
const LOCATION_NAMES=['OLD FOLKS','GREASY SPORK','SPORTS!','BOOZ','NO-TEL','SCHÜL'];
const ORGAN_TYPES=['intestine','heart','liver','lung','kidney','stomach'];
const ORGAN_ICONS={intestine:'🫘',heart:'❤️',liver:'🟤',lung:'🫁',kidney:'🫐',stomach:'🟡'};
const ORGAN_LABELS={};ORGAN_TYPES.forEach(o=>ORGAN_LABELS[o]=ORGAN_ICONS[o]+' '+o.charAt(0).toUpperCase()+o.slice(1));
const LOC_PENALTIES={0:{intestine:-1},1:{heart:-1},2:{liver:-1},3:{lung:-1},4:{kidney:-1},5:{stomach:-1}};
const ORGAN_COLORS={intestine:'#8B5CF6',heart:'#EF4444',liver:'#92400E',lung:'#F472B6',kidney:'#3B82F6',stomach:'#EAB308'};
const ALIEN_GUILE=['Computer Guidance!','Tractor Beam!','Data Hacking!','Hollow Ween!','Immunity!','Teleporter!'];
const AUTH_GUILE=['Anonymous Tip!','Quadrupeds!','Sabotage!','Neighborhood Watch!','Germs!','Men in Blarknap!'];

// Board geometry
const CX=480,CY=400,RX=350,RY=270;
const LOC_ANGLES=[120,60,0,-60,-120,180];
function deg2rad(d){return d*Math.PI/180}
function ellipseXY(a){return[CX+RX*Math.cos(deg2rad(a)),CY-RY*Math.sin(deg2rad(a))]}
function buildPositions(){
  const p=[];
  for(let i=0;i<6;i++){const[x,y]=ellipseXY(LOC_ANGLES[i]);p.push({id:i,type:'location',name:LOCATION_NAMES[i],x,y})}
  p.push({id:6,type:'hospital',name:'HOSPITAL',x:CX,y:CY});
  for(let s=0;s<6;s++){const a1=LOC_ANGLES[s],a2=LOC_ANGLES[(s+1)%6];let d=a2-a1;if(d>180)d-=360;if(d<-180)d+=360;for(let i=1;i<=4;i++){const[x,y]=ellipseXY(a1+d*i/5);p.push({id:7+s*4+(i-1),type:'step',x,y})}}
  for(let l=0;l<6;l++){const lx=p[l].x,ly=p[l].y;for(let i=1;i<=5;i++){const t=i/6;p.push({id:31+l*5+(i-1),type:'step',x:lx+(CX-lx)*t,y:ly+(CY-ly)*t})}}
  return p;
}
function buildAdjacency(){
  const a={};for(const p of positions)a[p.id]=new Set();
  function link(x,y){a[x].add(y);a[y].add(x)}
  for(let s=0;s<6;s++){const f=7+s*4;link(s,f);for(let i=0;i<3;i++)link(f+i,f+i+1);link(f+3,(s+1)%6)}
  for(let l=0;l<6;l++){const f=31+l*5;link(l,f);for(let i=0;i<4;i++)link(f+i,f+i+1);link(f+4,6)}
  return a;
}
const CRASH_POSITIONS=[7+5*4+2,7+2*4+2,7+1*4+2,7+4*4+2,7+0*4+2,7+3*4+2];
const positions=buildPositions();
const adjacency=buildAdjacency();
function isLocation(id){return id>=0&&id<=5}
function isHospital(id){return id===6}
function isPlace(id){return id<=6}

// Decks
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function genOrganDeck(){const c=[];for(let a=0;a<6;a++)for(let b=0;b<6;b++)c.push({type:'organ',primary:ORGAN_TYPES[a],secondary:ORGAN_TYPES[b]});return shuffle([...c,...c])}
function genGuileDeck(){const c=[];for(let a=0;a<6;a++)for(let b=0;b<6;b++)c.push({type:'guile',alien:ALIEN_GUILE[a],authority:AUTH_GUILE[b]});return shuffle([...c,...c])}
function organLabel(c){if(!c||c.type!=='organ')return'?';const p=c.primary[0].toUpperCase()+c.primary.slice(1),s=c.secondary[0].toUpperCase()+c.secondary.slice(1);return c.primary===c.secondary?ORGAN_ICONS[c.primary]+' '+p+' ×2':ORGAN_ICONS[c.primary]+' '+p+' / '+ORGAN_ICONS[c.secondary]+' '+s}
function guileLabel(c){return c?c.alien+' / '+c.authority:'?'}

// State
let myId=localStorage.getItem('ia_pid')||genId();localStorage.setItem('ia_pid',myId);
let myName='',currentRoom=null,roomRef=null,roomData=null,gameListeners=[];
let selectedCards=new Set();
function genId(){return Math.random().toString(36).substr(2,9)+Date.now().toString(36)}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active')}
function toast(m,d=2500){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function showModal(h){document.getElementById('modal-content').innerHTML=h;document.getElementById('modal-overlay').classList.add('active')}
function closeModal(){document.getElementById('modal-overlay').classList.remove('active')}

// Password
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword()});
function checkPassword(){if(document.getElementById('pw-input').value.trim().toLowerCase()==='phatphlamingo'){showScreen('lobby');const sn=localStorage.getItem('ia_name');if(sn)document.getElementById('player-name').value=sn;refreshRooms()}else document.getElementById('pw-error').style.display='block'}

// Lobby
function refreshRooms(){
  db.ref('illegalAliens/rooms').once('value',snap=>{
    const list=document.getElementById('room-list'),rooms=snap.val();
    if(!rooms){list.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p>';return}
    list.innerHTML='';
    Object.entries(rooms).forEach(([id,r])=>{
      if(r.status==='finished')return;
      const n=r.players?Object.keys(r.players).length:0;
      const d=document.createElement('div');d.className='room-item';
      d.innerHTML='<div><span class="rname">'+(r.name||id)+'</span> <span class="rcount">'+n+'/6</span></div><button class="btn small" onclick="joinRoom(\''+id+'\')" '+(r.status!=='waiting'||n>=6?'disabled':'')+'>JOIN</button>';
      list.appendChild(d);
    });
    if(!list.children.length)list.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px 0">No rooms found</p>';
  });
}
function createRoom(){myName=document.getElementById('player-name').value.trim();if(!myName){toast('Enter a name first!');return}localStorage.setItem('ia_name',myName);const rid=genId().substr(0,6).toUpperCase();db.ref('illegalAliens/rooms/'+rid).set({name:'Room '+rid,host:myId,status:'waiting',created:Date.now(),players:{[myId]:{name:myName,color:null,ready:false}}}).then(()=>enterRoom(rid))}

// Start game
function startGame(){
  if(!roomData)return;
  const pids=Object.keys(roomData.players),np=pids.length;
  const order=[...pids];for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}
  const od=genOrganDeck(),gd=genGuileDeck();let oi=0,gi=0;
  const pu={};const sg=np>=5?3:2;
  order.forEach((pid,idx)=>{
    const h=[];h.push(od[oi++]);h.push(od[oi++]);for(let g=0;g<sg;g++)h.push(gd[gi++]);
    pu[pid]={...roomData.players[pid],position:CRASH_POSITIONS[idx],crashLanding:idx,organs:{intestine:0,heart:0,liver:0,lung:0,kidney:0,stomach:0},hand:h,lastVisitedLocation:-1,wanted:false,eliminated:false};
  });
  roomRef.update({status:'playing',players:pu,turnOrder:order,currentTurn:0,phase:'ready',movementValue:0,stepsThisTurn:[],groundOrgans:{},agentPosition:6,germs:{},organDeck:od.slice(oi),guileDeck:gd.slice(gi),handLimit:np>=5?5:4,log:[{text:'Game started! '+roomData.players[order[0]].name+' goes first.',time:Date.now()}]});
}

function drawReady(t1,t2){
  const pid=cpId(),p=roomData.players[pid],h=p.hand?[...p.hand]:[];
  const od=roomData.organDeck?[...roomData.organDeck]:[],gd=roomData.guileDeck?[...roomData.guileDeck]:[];
  function draw(t){if(t==='organ'&&od.length)return od.shift();if(t==='guile'&&gd.length)return gd.shift();if(od.length)return od.shift();if(gd.length)return gd.shift();return null}
  const c1=draw(t1),c2=draw(t2);if(c1)h.push(c1);if(c2)h.push(c2);
  const u={};u['players/'+pid+'/hand']=h;u.organDeck=od.length?od:genOrganDeck();u.guileDeck=gd.length?gd:genGuileDeck();u.phase='set';
  roomRef.update(u);addLog('<span>'+p.name+'</span> draws 2 cards.');
}

function calcMods(locId,organ,isHosp,typesHarvested,totalQty){
  let mod=0,details=[];
  if(isHosp){mod-=1;details.push('Hospital: -1');mod-=typesHarvested.length;details.push('Types('+typesHarvested.length+'): -'+typesHarvested.length)}
  else{const pen=LOC_PENALTIES[locId];if(pen&&pen[organ]){mod+=pen[organ];details.push('Location: '+pen[organ])}}
  if(roomData.agentPosition===locId){mod-=1;details.push('Agent: -1')}
  const germs=(roomData.germs&&roomData.germs[locId])||0;if(germs){mod-=germs;details.push('Germs: -'+germs)}
  const go=roomData.groundOrgans&&roomData.groundOrgans[locId]?roomData.groundOrgans[locId]:{};
  if(isHosp){typesHarvested.forEach(o=>{const gc=go[o]||0;if(gc){mod+=gc;details.push('Ground '+o+': +'+gc)}})}
  else{const gc=go[organ]||0;if(gc){mod+=gc;details.push('Ground: +'+gc)}}
  // Selected organ cards
  const hand=myData().hand||[];let cb=0;
  selectedCards.forEach(idx=>{const card=hand[idx];if(card&&card.type==='organ'){
    if(isHosp){typesHarvested.forEach(o=>{if(card.primary===o&&card.secondary===o)cb+=2;else if(card.primary===o||card.secondary===o)cb+=1})}
    else{if(card.primary===organ&&card.secondary===organ)cb+=2;else if(card.primary===organ||card.secondary===organ)cb+=1}
  }});
  if(!isHosp&&cb>totalQty)cb=totalQty;
  if(cb){mod+=cb;details.push('Cards: +'+cb)}
  return{mod,details};
}

function renderPreview(target,mod,details){
  const need=target-mod;
  return '<div class="harvest-summary"><div class="hs-row"><span class="hs-label">Target:</span><span class="hs-val">'+target+'</span></div><div class="hs-row"><span class="hs-label">Modifiers:</span><span class="hs-val'+(mod<0?' bad':'')+'">'+(mod>=0?'+':'')+mod+'</span></div>'+details.map(d=>'<div class="hs-row"><span class="hs-label" style="font-size:11px;padding-left:12px">• '+d+'</span><span></span></div>').join('')+'<div class="hs-row" style="border-top:1px solid var(--border);padding-top:4px;margin-top:4px"><span class="hs-label">Need:</span><span class="hs-val">'+need+'+ on d6</span></div><div class="hs-row"><span class="hs-label">Nat 1 = auto-fail</span></div></div>';
}

function updateHarvPreview(){
  const pv=document.getElementById('harvest-preview');if(!pv)return;
  const os=document.getElementById('h-organ'),qs=document.getElementById('h-qty');if(!os||!qs)return;
  const organ=os.value;let qty=Math.max(1,parseInt(qs.value)||1);
  const mx=6-(cpData().organs[organ]||0);if(qty>mx){qs.value=mx;qty=mx}
  const target=Math.max(2,qty+1);
  const{mod,details}=calcMods(cpData().position,organ,false,[organ],qty);
  pv.innerHTML=renderPreview(target,mod,details);
}

function updateHospPreview(){
  const pv=document.getElementById('harvest-preview');if(!pv)return;
  let tq=0;const th=[];
  ORGAN_TYPES.forEach(o=>{const el=document.getElementById('hosp-'+o);const q=el?parseInt(el.value)||0:0;if(q>0){tq+=q;th.push(o)}});
  if(!tq){pv.innerHTML='<p style="color:var(--dim);font-size:11px;margin:8px 0">Select organs to see preview</p>';return}
  const target=Math.max(2,tq+1);
  const{mod,details}=calcMods(6,null,true,th,tq);
  pv.innerHTML=renderPreview(target,mod,details);
}

function execLocHarvest(){
  const os=document.getElementById('h-organ'),qs=document.getElementById('h-qty');if(!os||!qs)return;
  const organ=os.value,qty=Math.max(1,parseInt(qs.value)||1),cp=cpData(),pid=cpId(),loc=cp.position;
  const target=Math.max(2,qty+1);
  const go=roomData.groundOrgans&&roomData.groundOrgans[loc]?roomData.groundOrgans[loc]:{};
  // Calc mods
  let mod=0;const pen=LOC_PENALTIES[loc];if(pen&&pen[organ])mod+=pen[organ];
  if(roomData.agentPosition===loc)mod-=1;
  mod-=(roomData.germs&&roomData.germs[loc])||0;
  mod+=(go[organ]||0);
  const hand=cp.hand?[...cp.hand]:[];let cb=0;const rem=[];
  [...selectedCards].sort((a,b)=>b-a).forEach(idx=>{const c=hand[idx];if(c&&c.type==='organ'){let v=0;if(c.primary===organ&&c.secondary===organ)v=2;else if(c.primary===organ||c.secondary===organ)v=1;if(v&&cb<qty){cb+=Math.min(v,qty-cb);rem.push(idx)}}});
  mod+=cb;
  const roll=Math.floor(Math.random()*6)+1,result=roll+mod,ok=roll!==1&&result>=target;
  const nh=[...hand];rem.sort((a,b)=>b-a).forEach(i=>nh.splice(i,1));
  const u={};u['players/'+pid+'/hand']=nh;
  if(ok){u['players/'+pid+'/organs/'+organ]=Math.min(6,(cp.organs[organ]||0)+qty);const ex=result-target;if(ex>0)u['groundOrgans/'+loc+'/'+organ]=(go[organ]||0)+ex;
    addLog('<span>'+cp.name+'</span> rolled '+roll+(mod?'('+(mod>=0?'+':'')+mod+')='+result:'')+' vs '+target+'. ✅ Gained '+qty+' '+organ+(ex>0?', '+ex+' fell to ground':'')+'.');}
  else{const cc=cp.organs[organ]||0;if(cc>0){u['players/'+pid+'/organs/'+organ]=cc-1;u['groundOrgans/'+loc+'/'+organ]=(go[organ]||0)+1}
    addLog('<span>'+cp.name+'</span> rolled '+roll+(mod?'('+(mod>=0?'+':'')+mod+')='+result:'')+' vs '+target+'. ❌ Failed!'+(cc>0?' Lost 1 '+organ+'.':''));}
  u.phase='hide';selectedCards.clear();roomRef.update(u);
}

function execHospHarvest(){
  const cp=cpData(),pid=cpId(),loc=6;let tq=0;const tqs={},th=[];
  ORGAN_TYPES.forEach(o=>{const el=document.getElementById('hosp-'+o);const q=el?parseInt(el.value)||0:0;if(q>0){tqs[o]=q;tq+=q;th.push(o)}});
  if(!tq){toast('Select organs!');return}
  const target=Math.max(2,tq+1);let mod=-1-th.length;
  if(roomData.agentPosition===loc)mod-=1;mod-=(roomData.germs&&roomData.germs[loc])||0;
  const go=roomData.groundOrgans&&roomData.groundOrgans[loc]?roomData.groundOrgans[loc]:{};
  th.forEach(o=>{mod+=(go[o]||0)});
  const hand=cp.hand?[...cp.hand]:[];let cb=0;const rem=[];
  [...selectedCards].sort((a,b)=>b-a).forEach(idx=>{const c=hand[idx];if(c&&c.type==='organ'){th.forEach(o=>{if(c.primary===o&&c.secondary===o)cb+=2;else if(c.primary===o||c.secondary===o)cb+=1});rem.push(idx)}});
  mod+=cb;
  const roll=Math.floor(Math.random()*6)+1,result=roll+mod,ok=roll!==1&&result>=target;
  const nh=[...hand];rem.sort((a,b)=>b-a).forEach(i=>nh.splice(i,1));
  const u={};u['players/'+pid+'/hand']=nh;
  if(ok){Object.entries(tqs).forEach(([o,q])=>{u['players/'+pid+'/organs/'+o]=Math.min(6,(cp.organs[o]||0)+q)});
    const ex=result-target;if(ex>0){const per=Math.floor(ex/th.length);let r=ex%th.length;th.forEach(o=>{const e=per+(r>0?1:0);if(r>0)r--;if(e>0)u['groundOrgans/'+loc+'/'+o]=(go[o]||0)+e})}
    addLog('<span>'+cp.name+'</span> rolled '+roll+'('+(mod>=0?'+':'')+mod+')='+result+' vs '+target+'. ✅ Gained '+Object.entries(tqs).map(([o,q])=>q+' '+o).join(', ')+(ex>0?', '+ex+' excess':'')+'.');}
  else{const mo=th.sort((a,b)=>tqs[b]-tqs[a])[0];const cc=cp.organs[mo]||0;if(cc>0){u['players/'+pid+'/organs/'+mo]=cc-1;u['groundOrgans/'+loc+'/'+mo]=(go[mo]||0)+1}
    addLog('<span>'+cp.name+'</span> rolled '+roll+'('+(mod>=0?'+':'')+mod+')='+result+' vs '+target+'. ❌ Failed!'+(cc>0?' Lost 1 '+mo+'.':''));}
  u.phase='hide';selectedCards.clear();roomRef.update(u);
}

function bodyScan(){const cp=cpData();addLog('🛸 <span>'+cp.name+'</span> passes the BODY SCAN! THEY WIN! 🛸');roomRef.update({status:'finished',winner:cpId()})}
function skipHarvest(){addLog('<span>'+cpData().name+'</span> skips harvest.');selectedCards.clear();roomRef.update({phase:'hide'})}
function getPassedAliens(){if(!roomData||!roomData.stepsThisTurn)return[];const st=roomData.stepsThisTurn,pid=cpId(),r=[];Object.entries(roomData.players).forEach(([opid,op])=>{if(opid===pid||op.eliminated)return;if(st.slice(1).includes(op.position))r.push(opid)});return r}

// HIDE
function renderHidePhase(ctrl){
  const me=myData(),hand=me.hand||[],lim=roomData.handLimit||4;
  const afterD=hand.length-selectedCards.size,willD=Math.max(0,lim-afterD);
  let h='<p style="text-align:center;color:var(--dim);font-size:12px;margin:8px 0">Discard & draw up to '+lim+'</p>';
  if(selectedCards.size)h+='<p style="text-align:center;color:var(--pink);font-size:12px">'+selectedCards.size+' to discard</p>';
  if(willD||selectedCards.size)h+='<p style="text-align:center;color:var(--dim);font-size:11px">After: '+afterD+' → draw '+willD+'</p>';
  const od=(roomData.organDeck||[]).length,gd=(roomData.guileDeck||[]).length;
  if(willD>0)h+='<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0"><button class="btn small" onclick="execHide(\'organ\')">ORGAN ('+od+')</button><button class="btn small yellow" onclick="execHide(\'guile\')">GUILE ('+gd+')</button><button class="btn small pink" onclick="execHide(\'mix\')">MIX</button></div>';
  else h+='<div style="text-align:center;margin:8px 0"><button class="btn small" onclick="execHide(\'none\')">END TURN</button></div>';
  ctrl.innerHTML=h;
}

function execHide(pref){
  const pid=cpId(),me=roomData.players[pid],hand=me.hand?[...me.hand]:[],lim=roomData.handLimit||4;
  [...selectedCards].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));const dc=selectedCards.size;
  const need=Math.max(0,lim-hand.length);
  const od=roomData.organDeck?[...roomData.organDeck]:[],gd=roomData.guileDeck?[...roomData.guileDeck]:[];
  let dO=0,dG=0;
  for(let i=0;i<need;i++){let c=null;
    if(pref==='organ'&&od.length)c=od.shift();else if(pref==='guile'&&gd.length)c=gd.shift();
    else if(pref==='mix'){if(i%2===0&&od.length)c=od.shift();else if(gd.length)c=gd.shift();else if(od.length)c=od.shift()}
    if(!c&&od.length)c=od.shift();if(!c&&gd.length)c=gd.shift();
    if(!c){od.push(...genOrganDeck());gd.push(...genGuileDeck());c=od.shift()}
    if(c){hand.push(c);c.type==='organ'?dO++:dG++}
  }
  const u={};u['players/'+pid+'/hand']=hand;u.organDeck=od;u.guileDeck=gd;
  selectedCards.clear();
  const tot=dO+dG;
  roomRef.update(u).then(()=>{addLog('<span>'+me.name+'</span>'+(dc?' discards '+dc:'')+(tot?', draws '+tot:'')+(dc||tot?'.':'')+' Turn ends.');nextTurn()});
}

function nextTurn(){
  let n=(roomData.currentTurn+1)%roomData.turnOrder.length,s=0;
  while(roomData.players[roomData.turnOrder[n]].eliminated&&s<10){n=(n+1)%roomData.turnOrder.length;s++}
  addLog('<span>'+roomData.players[roomData.turnOrder[n]].name+"</span>'s turn begins.");
  roomRef.update({currentTurn:n,phase:'ready',movementValue:0,stepsThisTurn:[],stepsRemaining:0});
}

// Movement
function getValidMoves(){
  if(!roomData||roomData.phase!=='flee'||!isMyTurn())return[];
  const r=roomData.stepsRemaining||0;if(r<=0)return[];
  const cp=cpData(),vis=new Set(roomData.stepsThisTurn||[]),lv=cp.lastVisitedLocation,v=[];
  adjacency[cp.position].forEach(nid=>{if(vis.has(nid))return;if(isPlace(nid)&&nid===lv)return;v.push(nid)});return v;
}
function renderValidMoves(){document.querySelectorAll('.node.valid').forEach(n=>n.classList.remove('valid'));if(!isMyTurn()||roomData.phase!=='flee')return;getValidMoves().forEach(id=>{const n=document.getElementById('node-'+id);if(n)n.classList.add('valid')})}
function onNodeClick(nid){if(!isMyTurn()||roomData.phase!=='flee'||!getValidMoves().includes(nid))return;const pid=cpId(),st=[...(roomData.stepsThisTurn||[]),nid],r=(roomData.stepsRemaining||0)-1;const u={stepsThisTurn:st,stepsRemaining:r};u['players/'+pid+'/position']=nid;if(isPlace(nid))u['players/'+pid+'/lastVisitedLocation']=nid;roomRef.update(u).then(()=>{if(r<=0)setTimeout(advanceToHarvest,300)})}
function endFlee(){advanceToHarvest()}
function advanceToHarvest(){const cp=cpData(),nm=isPlace(cp.position)?positions[cp.position].name:'a step';addLog('<span>'+cp.name+'</span> stops at '+nm+'.');selectedCards.clear();roomRef.update({phase:'harvest',stepsRemaining:0})}

function confirmAbandon(){
  showModal('<h3>ABANDON GAME?</h3><p style="text-align:center;color:var(--dim);margin:12px 0">You will be removed from this game and cannot rejoin.</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn pink" onclick="closeModal();abandonGame()">ABANDON</button><button class="btn small" onclick="closeModal()">CANCEL</button></div>');
}

function abandonGame(){
  if(!roomRef||!roomData)return;
  const me=roomData.players[myId];
  if(me)addLog('<span>'+me.name+'</span> has abandoned the game.');
  // If it's this player's turn during an active game, advance to next
  if(roomData.status==='playing'&&roomData.turnOrder){
    const wasMyTurn=roomData.turnOrder[roomData.currentTurn]===myId;
    // Mark as eliminated
    roomRef.child('players/'+myId+'/eliminated').set(true);
    if(wasMyTurn){
      // Advance turn
      let n=(roomData.currentTurn+1)%roomData.turnOrder.length,s=0;
      while(s<10){const pid=roomData.turnOrder[n];const p=roomData.players[pid];if(pid!==myId&&!p.eliminated)break;n=(n+1)%roomData.turnOrder.length;s++}
      roomRef.update({currentTurn:n,phase:'ready',movementValue:0,stepsThisTurn:[],stepsRemaining:0});
    }
  } else {
    roomRef.child('players/'+myId).remove();
  }
  leaveRoom();
}

window.addEventListener('load',()=>{
  // Check for existing session to reconnect
  const savedRoom=localStorage.getItem('ia_room');
  if(savedRoom){
    db.ref('illegalAliens/rooms/'+savedRoom).once('value',snap=>{
      const data=snap.val();
      if(data&&data.players&&data.players[myId]&&data.status!=='finished'){
        // Reconnect: skip password, go straight to room
        myName=data.players[myId].name;
        enterRoom(savedRoom);
      } else {
        localStorage.removeItem('ia_room');
        document.getElementById('pw-input').focus();
      }
    });
  } else {
    document.getElementById('pw-input').focus();
  }
});
</script>
